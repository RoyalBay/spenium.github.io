<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  padding:8px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* LOGO MATCH */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:22px;
}

.logo img{
  height:54px;
}

/* BACK LEFT FIX */
.backLeft{
  margin-left:0;
}

/* CARD */
.card{
  max-width:500px;
  margin:40px auto;
  background:white;
  padding:15px;
}

button{
  background:#3b5998;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  margin-top:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <span>WUPHF</span>
  </div>

  <button class="backLeft" onclick="back()">Back</button>

</div>

<div class="card">
  <h3>Themes</h3>

  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('dynamic')">Dynamic</button>

  <p>More settings coming soon</p>
</div>

<script>

function setTheme(t){
  localStorage.setItem("theme",t);
  applyTheme();
}

function applyTheme(){
  let t = localStorage.getItem("theme") || "light";

  if(t==="light"){
    document.body.style.background="#f5f6f7";
  }

  if(t==="dark"){
    document.body.style.background="#2b2b2b";
  }

  if(t==="dynamic"){
    document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
  }
}

function back(){
  location.href="feed.html";
}

applyTheme();

</script>

</body>
</html>
