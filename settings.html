<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>
<link rel="icon" href="wicon.png">

<style>
body{
  font-family:Tahoma;
  margin:0;
}

.topbar{
  background:#3b5998;
  color:white;
  padding:10px;
}

.box{
  width:300px;
  margin:50px auto;
  background:white;
  border:1px solid #ccc;
  padding:15px;
}

button{
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="location.href='feed.html'">Back</button>
  WUPHF Settings
</div>

<div class="box">

<h3>Themes</h3>

<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('dynamic')">Dynamic</button>

</div>

<script>
function setTheme(t){
  localStorage.setItem("theme",t);
  alert("Theme set to "+t);
}
</script>

</body>
</html>
