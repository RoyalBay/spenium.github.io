<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>
<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

/* TOP BAR (FIXED SMALL, NOT HUGE) */
.topbar{
  height:44px;
  background:#3b5998;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
}

.topbar .left{
  display:flex;
  align-items:center;
  gap:8px;
}

.topbar img{
  height:32px;
}

/* BACK BUTTON FAR RIGHT */
.backBtn{
  background:white;
  color:#3b5998;
  border:none;
  padding:6px 10px;
  cursor:pointer;
}

/* BOX */
.box{
  width:300px;
  margin:40px auto;
  background:white;
  border:1px solid #ccc;
  padding:10px;
  box-sizing:border-box;
}

h3{
  margin-top:0;
}

button{
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div class="left">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <button class="backBtn" onclick="location.href='feed.html'">Back</button>

</div>

<!-- SETTINGS -->
<div class="box">

<h3>Settings</h3>

<h4>Themes</h4>

<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('dynamic')">Dynamic</button>

</div>

<script>
function setTheme(t){
  localStorage.setItem("theme",t);
}
</script>

</body>
</html>
