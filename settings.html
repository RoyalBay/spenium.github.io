<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Settings</title>

<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
}

/* TOP BAR (MATCH FEED SIZE EXACTLY) */
.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
}

/* LOGO (MATCH FEED) */
.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  height:34px;
}

/* SETTINGS BOX */
.container{
  max-width:600px;
  margin:40px auto;
  background:white;
  padding:20px;
  border:1px solid #ccc;
}

/* BACK BUTTON FIX (FAR RIGHT) */
.backBtn{
  margin-left:auto;
  background:white;
  color:#3b5998;
  border:none;
  padding:6px 10px;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <!-- MUST STAY FAR RIGHT -->
  <button class="backBtn" onclick="location.href='feed.html'">
    Back
  </button>

</div>

<div class="container">

  <!-- ORIGINAL CONTENT KEPT -->
  <h3>Themes</h3>

  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('dynamic')">Dynamic</button>

  <p>More settings coming soon</p>

</div>

<script>
function setTheme(t){
  localStorage.setItem("theme", t);
}
</script>

</body>
</html>
