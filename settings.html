<!DOCTYPE html>
<html>
<head>
<title>Settings</title>
<style>
body{font-family:Tahoma;margin:0;}
.topbar{background:#3b5998;color:white;padding:12px;display:flex;justify-content:space-between;}
.card{max-width:400px;margin:40px auto;background:white;padding:15px;}
button{background:#3b5998;color:white;border:none;padding:8px;width:100%;margin-top:6px;}
</style>
</head>

<body>

<div class="topbar">
  <div onclick="location='feed.html'">WUPHF</div>
  <div>
    <button onclick="location='feed.html'">Feed</button>
    <button onclick="location='profile.html'">Profile</button>
  </div>
</div>

<div class="card">
<h3>Themes</h3>

<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('dynamic')">Dynamic</button>

<p>More settings coming soon</p>
</div>

<script>

function setTheme(t){
  localStorage.setItem("theme",t);
  applyTheme();
}

function applyTheme(){
  let t=localStorage.getItem("theme")||"light";

  if(t==="dark") document.body.style.background="#1e1e1e";
  else if(t==="dynamic") document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
  else document.body.style.background="linear-gradient(#dfe7f3,#f5f6f7)";
}

applyTheme();

</script>

</body>
</html>
