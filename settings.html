<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  transition:0.3s;
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  padding:8px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:22px;
}

.logo img{
  height:54px;
}

/* BACK LEFT FIX (IMPORTANT) */
.backBtn{
  margin-left:auto;
}

/* CARD */
.card{
  max-width:500px;
  margin:40px auto;
  padding:15px;
  border-radius:6px;
  background:white;
  transition:0.3s;
}

/* BUTTONS */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  margin-top:6px;
  cursor:pointer;
}

/* DARK MODE FIX (FULL UI) */
body.dark{
  background:#1c1c1c;
  color:#e5e5e5;
}

body.dark .card{
  background:#2a2a2a;
  color:#e5e5e5;
}
</style>
</head>

<body>

<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <span>WUPHF</span>
  </div>

  <button class="backBtn" onclick="back()">Back</button>

</div>

<div class="card">
  <h3>Themes</h3>

  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('dynamic')">Dynamic</button>

  <p>More settings coming soon</p>
</div>

<script>

function setTheme(t){
  localStorage.setItem("theme",t);
  applyTheme();
}

function applyTheme(){
  let t = localStorage.getItem("theme") || "light";

  document.body.classList.remove("dark");

  if(t==="dark"){
    document.body.classList.add("dark");
  }

  if(t==="dynamic"){
    document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
  } else if(t!=="dynamic"){
    document.body.style.background="";
  }
}

function back(){
  location.href="feed.html";
}

applyTheme();

</script>

</body>
</html>
