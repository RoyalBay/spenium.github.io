<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

/* FIXED: no duplicate display rules */
.container {
  max-width:1050px;
  margin:20px auto;
  display:none;
  gap:10px;
}

/* layout */
.layout {
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

input, textarea, button {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
  box-sizing:border-box;
}

textarea { height:70px; resize:none; }

button {
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

.user { color:#3b5998; font-weight:bold; cursor:pointer; }

.post {
  border-top:1px solid #eee;
  padding:10px 0;
  position:relative;
}

.follow-btn {
  font-size:11px;
  padding:3px 6px;
  width:auto;
}

.upvote { cursor:pointer; font-size:12px; }

.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

.small { font-size:11px; color:#777; }

.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  border:2px solid #999;
}

.verified { width:14px; vertical-align:middle; }
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- FEED -->
    <div id="feed" class="feed card">
      <h3>Feed</h3>
      <textarea id="postText"></textarea>
      <button onclick="addPost()">Post</button>
      <div id="posts"></div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="feed card" style="display:none;">
      <h3>Inbox</h3>

      <input id="msgUser" placeholder="Username">
      <textarea id="msgText"></textarea>
      <button onclick="sendMessage()">Send</button>

      <div id="messageList"></div>
      <hr>
      <div id="chatBox"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="profile card">
      <h3>Profile</h3>

      <img id="profilePic" class="profile-pic" src="empty.jpg">

      <input type="file" id="profileUpload">
      <button onclick="updateProfile()">Update</button>

      <p id="profileName"></p>
      <p id="profileFollowers"></p>
    </div>

  </div>
</div>

<script>
let currentUser=null;
let viewingUser=null;

/* STORAGE SAFE */
function getUsers(){
  let u = JSON.parse(localStorage.getItem("users")||"{}");

  /* FIX: ensure every user has full structure */
  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
  });

  return u;
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* SESSION FIX */
window.onload=()=>{
  let saved=localStorage.getItem("currentUser");

  if(saved){
    currentUser=saved;
    loginBox.style.display="none";
    app.style.display="block";
    app.classList.add("layout");
    loadFeed();
    loadProfile();
  } else {
    loginBox.style.display="block";
    app.style.display="none";
  }
};

/* LOGIN */
function login(){
  let users=getUsers();
  let u=username.value;
  let p=password.value;

  loginError.innerText="";

  if(!users[u]){
    users[u]={
      password:p,
      pic:"empty.jpg",
      posts:[],
      followers:[],
      following:[],
      messages:{}
    };
  }

  if(users[u].password!==p){
    loginError.innerText="Password incorrect";
    return;
  }

  currentUser=u;
  localStorage.setItem("currentUser",u);
  saveUsers(users);

  loginBox.style.display="none";
  app.style.display="block";

  loadFeed();
  loadProfile();
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

/* NAV */
function showTab(tab){
  feed.style.display = tab==="feed"?"block":"none";
  messages.style.display = tab==="messages"?"block":"none";
  if(tab==="messages") loadInbox();
}

function goHome(){
  viewingUser=null;
  showTab("feed");
  loadProfile();
}

/* FOLLOW */
function toggleFollow(user){
  let users=getUsers();

  if(user===currentUser) return;

  if(!users[currentUser].following.includes(user)){
    users[currentUser].following.push(user);
    users[user].followers.push(currentUser);
  } else {
    users[currentUser].following =
      users[currentUser].following.filter(x=>x!==user);
    users[user].followers =
      users[user].followers.filter(x=>x!==currentUser);
  }

  saveUsers(users);
  loadFeed();
  loadProfile();
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value.trim();
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    time:new Date().toLocaleString(),
    likes:[]
  });

  saveUsers(users);
  postText.value="";
  loadFeed();
}

/* LIKE */
function upvote(id){
  let users=getUsers();

  Object.values(users).forEach(u=>{
    u.posts.forEach(p=>{
      if(p.id===id){
        if(!p.likes.includes(currentUser))
          p.likes.push(currentUser);
        else
          p.likes=p.likes.filter(x=>x!==currentUser);
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE FIX */
function deletePost(id,owner){
  if(owner!==currentUser) return;

  let users=getUsers();

  users[currentUser].posts =
    users[currentUser].posts.filter(p=>p.id!==id);

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div>
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
        </span>
        <button class="follow-btn" onclick="toggleFollow('${p.user}')">
          Follow
        </button>
      </div>

      <div>${p.text}</div>

      <div class="upvote" onclick="upvote(${p.id})">
        ▲ ${p.likes.length}
      </div>

      <div class="small">${p.time}</div>

      ${p.user===currentUser?
        `<div class="delete" onclick="deletePost(${p.id},'${p.user}')">delete</div>`
        :""}
    `;

    posts.appendChild(div);
  });
}

/* PROFILE */
function openProfile(user){
  viewingUser=user;
  loadProfile();
}

function loadProfile(){
  let users=getUsers();
  let u=users[viewingUser||currentUser];

  profileName.innerText="@"+(viewingUser||currentUser);
  profilePic.src=u.pic;
  profileFollowers.innerText="Followers: "+u.followers.length;
}

/* PROFILE PIC */
function updateProfile(){
  let users=getUsers();
  let file=profileUpload.files[0];
  if(!file) return;

  let r=new FileReader();
  r.onload=e=>{
    users[currentUser].pic=e.target.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}

/* MESSAGES FIX (WORKS FOR ALL USERS) */
function sendMessage(){
  let users=getUsers();
  let to=msgUser.value.trim();
  let text=msgText.value.trim();

  if(!users[to]||!text) return;

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  let msg={from:currentUser,text};

  users[currentUser].messages[to].push(msg);
  users[to].messages[currentUser].push(msg);

  saveUsers(users);

  loadInbox();
  loadChat(to);
}

function loadInbox(){
  let users=getUsers();
  messageList.innerHTML="";

  let convos=users[currentUser].messages;

  Object.keys(convos).forEach(user=>{
    let div=document.createElement("div");
    div.innerText="@"+user;
    div.onclick=()=>loadChat(user);
    messageList.appendChild(div);
  });
}

function loadChat(user){
  let users=getUsers();
  chatBox.innerHTML="";

  let msgs=users[currentUser].messages[user]||[];

  msgs.forEach(m=>{
    let div=document.createElement("div");
    div.innerText=m.from+": "+m.text;
    chatBox.appendChild(div);
  });
}
</script>

</body>
</html>
