<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.screen { display:none; }

.center {
  max-width:420px;
  margin:80px auto;
}

.container {
  max-width:1050px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
  box-sizing:border-box;
}

textarea { height:70px; resize:none; }

button {
  width:100%;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

.user {
  color:#3b5998;
  font-weight:bold;
  cursor:pointer;
}

.post {
  border-top:1px solid #eee;
  padding:10px 0;
  position:relative;
}

.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- WELCOME -->
<div id="welcome" class="screen center card" style="display:block;">
  <h2>just WUPHF it.</h2>
  <p>whenever. wherever.</p>

  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen center card">
  <h3>Create Account</h3>
  <input id="signupUser" placeholder="Username">
  <input id="signupPass" type="password">
  <div id="signupError" style="color:red;font-size:12px;"></div>
  <button onclick="createAccount()">Create</button>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div class="container">

    <div class="sidebar card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- FEED -->
    <div id="feed" class="feed card">
      <h3>Feed</h3>
      <textarea id="postText"></textarea>
      <button onclick="addPost()">Post</button>
      <div id="posts"></div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="feed card" style="display:none;">
      <h3>Messages</h3>
      <input id="msgUser" placeholder="Username">
      <textarea id="msgText"></textarea>
      <button onclick="sendMessage()">Send</button>
      <div id="messageList"></div>
      <div id="chatBox"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="profile card">
      <h3>Profile</h3>

      <img id="profilePic" class="profile-pic" src="empty.jpg">
      <input type="file" onchange="updatePic(event)">

      <button onclick="refreshProfile()">Update Profile</button>

      <p id="profileName"></p>
      <p id="profileFollowers"></p>

      <div id="followArea"></div>
      <div id="verifyArea"></div>
    </div>

  </div>
</div>

<script>

let currentUser=null;
let viewingUser=null;

/* NAV */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function showTab(tab){
  document.getElementById("feed").style.display="none";
  document.getElementById("messages").style.display="none";
  document.getElementById(tab).style.display="block";

  if(tab==="feed") loadFeed();
  if(tab==="messages") loadInbox();

  loadProfile();
}

function goHome(){
  if(currentUser){
    viewingUser=null;
    showScreen("app");
    showTab("feed");
  } else {
    showScreen("welcome");
  }
}

/* STORAGE */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");

  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
    u[k].verified ||= false;
  });

  return u;
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* LOGIN */
function login(){
  let users=getUsers();
  let u=loginUser.value.trim();
  let p=loginPass.value;

  loginError.innerText="";

  if(!users[u]){
    loginError.innerText="Incorrect username";
    return;
  }

  if(users[u].password!==p){
    loginError.innerText="Incorrect password";
    return;
  }

  currentUser=u;

  showScreen("app");
  showTab("feed");
}

/* SIGNUP */
function createAccount(){
  let users=getUsers();
  let u=signupUser.value.trim();
  let p=signupPass.value;

  if(users[u]){
    signupError.innerText="Username already exists";
    return;
  }

  users[u]={
    password:p,
    posts:[],
    followers:[],
    following:[],
    messages:{},
    pic:"empty.jpg",
    verified:false
  };

  saveUsers(users);
  signupError.innerText="Account created. Login.";
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value.trim();
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    time:new Date().toLocaleString()
  });

  saveUsers(users);
  postText.value="";
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let verified = users[p.user].verified ? "✔️" : "";

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user" onclick="openProfile('${p.user}')">
        @${p.user} ${verified}
      </div>
      <div>${p.text}</div>
      <div style="font-size:11px;color:#777;">${p.time}</div>
      ${p.user===currentUser?`<div class="delete" onclick="deletePost(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* DELETE */
function deletePost(id){
  let users=getUsers();
  users[currentUser].posts=users[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(users);
  loadFeed();
}

/* PROFILE */
function loadProfile(){
  let users=getUsers();
  let user=viewingUser||currentUser;
  let u=users[user];

  if(!u) return;

  profilePic.src=u.pic;

  profileName.innerHTML=`<b>@${user}</b> ${u.verified?"✔️":""}`;
  profileFollowers.innerText="Followers: "+u.followers.length;

  followArea.innerHTML="";
  verifyArea.innerHTML="";

  // FOLLOW
  if(user!==currentUser){
    let isFollowing=users[currentUser].following.includes(user);

    let btn=document.createElement("button");
    btn.innerText=isFollowing?"Unfollow":"Follow";
    btn.onclick=()=>toggleFollow(user);

    followArea.appendChild(btn);
  }

  // VERIFY BUTTON
  if(user===currentUser){
    let vBtn=document.createElement("button");
    vBtn.innerText = u.verified ? "Unverify Account" : "Verify Account";

    vBtn.onclick=()=>{
      let users=getUsers();
      users[currentUser].verified=!users[currentUser].verified;
      saveUsers(users);
      loadProfile();
      loadFeed();
    };

    verifyArea.appendChild(vBtn);
  }
}

/* FOLLOW */
function toggleFollow(user){
  let users=getUsers();
  let me=users[currentUser];
  let them=users[user];

  if(me.following.includes(user)){
    me.following=me.following.filter(u=>u!==user);
    them.followers=them.followers.filter(u=>u!==currentUser);
  } else {
    me.following.push(user);
    them.followers.push(currentUser);
  }

  saveUsers(users);
  loadProfile();
}

/* PROFILE PIC */
function updatePic(e){
  let file=e.target.files[0];
  if(!file) return;

  let r=new FileReader();
  r.onload=()=>{
    let users=getUsers();
    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}

function refreshProfile(){
  loadProfile();
}

function openProfile(u){
  viewingUser=u;
  loadProfile();
}

/* MESSAGES */
function sendMessage(){
  let users=getUsers();
  let to=msgUser.value.trim();
  let text=msgText.value.trim();

  if(!users[to]||!text) return;

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  let msg={from:currentUser,text};

  users[currentUser].messages[to].push(msg);
  users[to].messages[currentUser].push(msg);

  saveUsers(users);

  msgText.value="";
  loadInbox();
  loadChat(to);
}

function loadInbox(){
  let users=getUsers();
  messageList.innerHTML="";

  Object.keys(users[currentUser].messages).forEach(u=>{
    let div=document.createElement("div");
    div.innerText="@"+u;
    div.onclick=()=>loadChat(u);
    messageList.appendChild(div);
  });
}

function loadChat(u){
  let users=getUsers();
  chatBox.innerHTML="";

  (users[currentUser].messages[u]||[]).forEach(m=>{
    let div=document.createElement("div");
    div.innerText=m.from+": "+m.text;
    chatBox.appendChild(div);
  });
}

function logout(){
  currentUser=null;
  viewingUser=null;
  showScreen("welcome");
}

</script>

</body>
</html>
