<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.screen { display:none; }

.center {
  max-width:400px;
  margin:80px auto;
}

.container {
  max-width:1050px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
  box-sizing:border-box;
}

textarea { height:70px; resize:none; }

button {
  width:100%;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

.user {
  color:#3b5998;
  font-weight:bold;
  cursor:pointer;
}

.post {
  border-top:1px solid #eee;
  padding:10px 0;
  position:relative;
}

/* FIXED FOLLOW BUTTON SIZE */
.follow-btn {
  font-size:10px;
  padding:2px 5px;
  width:auto;
  margin-left:8px;
}

.upvote {
  cursor:pointer;
  font-size:12px;
}

.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.verified {
  width:14px;
  vertical-align:middle;
}

.profile-name {
  font-weight:bold;
}

/* messages styling */
#messageList div {
  padding:6px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

#chatBox div {
  padding:6px;
  margin:4px 0;
  background:#f1f1f1;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- WELCOME (WORKING FIXED) -->
<div id="welcome" class="screen center card" style="display:block;">
  <h2>just WUPHF it.</h2>
  <p style="font-size:12px;color:#555;">whenever. whenever.</p>

  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen center card">
  <h3>Create Account</h3>
  <input id="signupUser" placeholder="Username">
  <input id="signupPass" type="password" placeholder="Password">
  <div id="signupError" style="color:red;font-size:12px;"></div>
  <button onclick="createAccount()">Create</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div class="container">

    <div class="sidebar card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- FEED -->
    <div id="feed" class="feed card">
      <h3>Feed</h3>
      <textarea id="postText"></textarea>
      <button onclick="addPost()">Post</button>
      <div id="posts"></div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="feed card" style="display:none;">
      <h3>Messages</h3>
      <input id="msgUser" placeholder="Username">
      <textarea id="msgText"></textarea>
      <button onclick="sendMessage()">Send</button>

      <div id="messageList"></div>
      <div id="chatBox"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="profile card">
      <h3>Profile</h3>

      <img id="profilePic" class="profile-pic" src="empty.jpg">

      <input type="file" accept="image/*" onchange="updatePic(event)">

      <p id="profileName"></p>
      <p id="profileFollowers"></p>
    </div>

  </div>
</div>

<script>
let currentUser=null;
let viewingUser=null;

/* NAV */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function showTab(tab){
  feed.style.display="none";
  messages.style.display="none";

  document.getElementById(tab).style.display="block";

  if(tab==="messages") loadInbox();
  if(tab==="feed") loadFeed();
  loadProfile();
}

function goHome(){
  if(!currentUser){
    showScreen("welcome");
  } else {
    showScreen("app");
    showTab("feed");
  }
}

/* USERS */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");

  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
  });

  return u;
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* SIGNUP FIXED */
function createAccount(){
  let users=getUsers();
  let u=signupUser.value.trim();
  let p=signupPass.value;

  if(users[u]){
    signupError.innerText="Username already exists";
    return;
  }

  users[u]={password:p,posts:[],followers:[],following:[],messages:{},pic:"empty.jpg"};
  saveUsers(users);

  signupError.innerText="Account created. Login.";
}

/* LOGIN FIXED */
function login(){
  let users=getUsers();
  let u=loginUser.value;
  let p=loginPass.value;

  if(!users[u]){
    loginError.innerText="Incorrect username";
    return;
  }

  if(users[u].password!==p){
    loginError.innerText="Incorrect password";
    return;
  }

  currentUser=u;
  showScreen("app");
  showTab("feed");
}

/* LOGOUT FIXED */
function logout(){
  currentUser=null;
  viewingUser=null;
  showScreen("welcome");
}

/* VERIFIED (RESTORED) */
function isVerified(user){
  let users=getUsers();
  return (users[user]?.followers.length||0)>=100;
}

/* FOLLOW (RESTORED) */
function toggleFollow(user){
  let users=getUsers();
  if(user===currentUser) return;

  let f=users[currentUser].following;
  let r=users[user].followers;

  if(!f.includes(user)){
    f.push(user);
    r.push(currentUser);
  } else {
    users[currentUser].following=f.filter(x=>x!==user);
    users[user].followers=r.filter(x=>x!==currentUser);
  }

  saveUsers(users);
  loadFeed();
  loadProfile();
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value.trim();
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    likes:[]
  });

  saveUsers(users);
  loadFeed();
}

/* FEED (RESTORED FULL FEATURES) */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let isFollowing=users[currentUser].following.includes(p.user);

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <span class="user" onclick="openProfile('${p.user}')">
        @${p.user}
        ${isVerified(p.user)?'<img class="verified" src="verified.png">':''}
      </span>

      <button class="follow-btn" onclick="toggleFollow('${p.user}')">
        ${isFollowing?"Unfollow":"Follow"}
      </button>

      <div>${p.text}</div>
    `;

    posts.appendChild(div);
  });
}

/* PROFILE */
function loadProfile(){
  let users=getUsers();
  let u=users[viewingUser||currentUser];

  profilePic.src=u.pic;
  profileName.innerHTML="<b>@"+(viewingUser||currentUser)+"</b>" +
    (isVerified(viewingUser||currentUser)?' <img class="verified" src="verified.png">':"");

  profileFollowers.innerText="Followers: "+u.followers.length;
}

function openProfile(u){
  viewingUser=u;
  loadProfile();
}

/* PROFILE PIC */
function updatePic(e){
  let file=e.target.files[0];
  if(!file) return;

  let r=new FileReader();
  r.onload=()=>{
    let users=getUsers();
    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}

/* MESSAGES (UNCHANGED WORKING CORE) */
function sendMessage(){
  let users=getUsers();
  let to=msgUser.value.trim();
  let text=msgText.value.trim();

  if(!users[to]||!text) return;

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  let msg={from:currentUser,text};

  users[currentUser].messages[to].push(msg);
  users[to].messages[currentUser].push(msg);

  saveUsers(users);

  loadInbox();
  loadChat(to);
}

function loadInbox(){
  let users=getUsers();
  messageList.innerHTML="";

  Object.keys(users[currentUser].messages).forEach(u=>{
    let div=document.createElement("div");
    div.innerText="@"+u;
    div.onclick=()=>loadChat(u);
    messageList.appendChild(div);
  });
}

function loadChat(u){
  let users=getUsers();
  chatBox.innerHTML="";

  (users[currentUser].messages[u]||[]).forEach(m=>{
    let div=document.createElement("div");
    div.innerText=m.from+": "+m.text;
    chatBox.appendChild(div);
  });
}
</script>

</body>
</html>
