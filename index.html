<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>

/* THEMES */
body.light {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

body.dark {
  margin:0;
  font-family:Tahoma;
  background:#1c1c1c;
  color:white;
}

body.dynamic {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.nav button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  margin-left:6px;
  cursor:pointer;
}

/* LAYOUT */
.container {
  display:flex;
  max-width:1200px;
  margin:20px auto;
  gap:10px;
}

.feed { flex:1; }

.profile {
  width:260px;
}

/* CARD */
.card {
  background:white;
  padding:12px;
  border-radius:4px;
}

body.dark .card,
body.dynamic .card {
  background:#2a2a2a;
}

/* INPUT */
input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  box-sizing:border-box;
  resize:none;
}

/* POSTS */
.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user {
  font-weight:bold;
  color:#3b5998;
}

/* BUTTONS */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
  width:auto;
}

/* DELETE (RESTORED) */
.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

/* PROFILE */
.profile-pic {
  width:90px;
  height:90px;
  border-radius:6px;
  object-fit:cover;
}

.verified {
  color:#f5c542;
  font-weight:bold;
}

/* LOGIN */
#loginScreen {
  max-width:400px;
  margin:80px auto;
}

</style>
</head>

<body class="light">

<!-- TOP BAR -->
<div class="topbar">
  <div onclick="goHome()" style="cursor:pointer;">WUPHF</div>

  <div class="nav">
    <button onclick="showFeed()">Feed</button>
    <button onclick="openSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="card">
  <h2>just WUPHF it.</h2>
  <p>whenever. wherever.</p>

  <input id="user">
  <input id="pass" type="password">

  <button onclick="login()">Login</button>
  <button onclick="createAccount()">Create Account</button>

  <div id="loginError" style="color:red;"></div>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="card" style="display:none; max-width:500px; margin:40px auto;">
  <h2>Settings</h2>

  <h3>Themes</h3>
  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('dynamic')">Dynamic</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="container">

  <!-- FEED -->
  <div class="feed card">
    <h3>Feed</h3>

    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>

    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div class="profile card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic">
    <input type="file" onchange="updatePic(event)">

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

</div>

<script>

let currentUser=null;

/* NAV */
function goHome(){
  if(currentUser){
    document.getElementById("app").style.display="block";
    document.getElementById("settingsScreen").style.display="none";
    loadFeed();
  }
}

function showFeed(){
  if(!currentUser) return;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("settingsScreen").style.display="none";
  document.getElementById("app").style.display="block";
  loadFeed();
}

/* SETTINGS FIX */
function openSettings(){
  document.getElementById("app").style.display="none";
  document.getElementById("settingsScreen").style.display="block";
}

function setTheme(t){
  document.body.className=t;
}

/* LOGIN FIX */
function login(){
  currentUser=user.value;

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";

  loadFeed();
  loadProfile();
}

/* POSTS */
function addPost(){
  let users=getUsers();

  if(!users[currentUser]){
    users[currentUser]={posts:[],followers:[],pic:"empty.jpg"};
  }

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:postText.value,
    time:new Date().toLocaleString(),
    likes:0
  });

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>{
    if(u.posts) all.push(...u.posts);
  });

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user">@${p.user}</div>
      <div>${p.text}</div>
      <div style="font-size:11px;color:gray;">${p.time}</div>

      <button onclick="like(${p.id})">▲ ${p.likes}</button>

      ${p.user===currentUser?`<div class="delete" onclick="del(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* LIKE */
function like(id){
  let users=getUsers();

  Object.values(users).forEach(u=>{
    (u.posts||[]).forEach(p=>{
      if(p.id===id) p.likes++;
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE FIXED */
function del(id){
  let users=getUsers();
  users[currentUser].posts=users[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(users);
  loadFeed();
}

/* PROFILE FIXED */
function loadProfile(){
  let users=getUsers();
  let u=users[currentUser]||{followers:[],pic:"empty.jpg"};

  profilePic.src=u.pic;
  profileName.innerHTML=`<b>@${currentUser}</b>`;
  profileFollowers.innerText="Followers: "+(u.followers?.length||0);
}

/* PROFILE PIC FIX (THIS WAS YOUR BIG BUG) */
function updatePic(e){
  let file=e.target.files[0];
  if(!file) return;

  let r=new FileReader();

  r.onload=()=>{
    let users=getUsers();
    if(!users[currentUser]) users[currentUser]={followers:[],posts:[]};

    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };

  r.readAsDataURL(file);
}

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

function createAccount(){
  let users=getUsers();
  users[user.value]={posts:[],followers:[],pic:"empty.jpg"};
  saveUsers(users);
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
