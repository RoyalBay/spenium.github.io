<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.screen { display:none; }

.center {
  max-width:400px;
  margin:80px auto;
}

.container {
  max-width:1050px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
  box-sizing:border-box;
  resize:none;
}

textarea { height:70px; }

button {
  width:100%;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

.user { color:#3b5998; font-weight:bold; cursor:pointer; }

.post {
  border-top:1px solid #eee;
  padding:10px 0;
  position:relative;
}

.follow-btn {
  font-size:11px;
  padding:3px 6px;
  width:auto;
}

.upvote { cursor:pointer; font-size:12px; }

.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.verified {
  width:14px;
  vertical-align:middle;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- WELCOME -->
<div id="welcome" class="screen center card" style="display:block;">
  <h2>WUPHF</h2>
  <p style="font-size:12px;color:#555;">just WUPHF it.</p>
  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen center card">
  <h3>Create Account</h3>
  <input id="signupUser" placeholder="Username">
  <input id="signupPass" type="password" placeholder="Password">
  <div id="signupError" style="color:red;font-size:12px;"></div>
  <button onclick="createAccount()">Create</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div class="container">

    <div class="sidebar card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="feed" class="feed card">
      <h3>Feed</h3>
      <textarea id="postText"></textarea>
      <button onclick="addPost()">Post</button>
      <div id="posts"></div>
    </div>

    <div id="messages" class="feed card" style="display:none;">
      <h3>Messages</h3>
      <input id="msgUser" placeholder="Username">
      <textarea id="msgText"></textarea>
      <button onclick="sendMessage()">Send</button>

      <div id="messageList"></div>
      <hr>
      <div id="chatBox"></div>
    </div>

    <div id="profile" class="profile card">
      <h3>Profile</h3>
      <img id="profilePic" class="profile-pic" src="empty.jpg">
      <p id="profileName"></p>
      <p id="profileFollowers"></p>
    </div>

  </div>
</div>

<script>
let currentUser=null;
let viewingUser=null;

/* SCREEN CONTROL */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* HOME FIX */
function goHome(){
  if(!currentUser){
    showScreen("welcome");
    return;
  }
  viewingUser=null;
  showScreen("app");
  showTab("feed");
  loadProfile();
}

/* STORAGE SAFE */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");

  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
  });

  return u;
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* ACCOUNT */
function createAccount(){
  let users=getUsers();
  let u=signupUser.value.trim();
  let p=signupPass.value;

  if(users[u]){
    signupError.innerText="Username already in use";
    return;
  }

  users[u]={password:p,posts:[],followers:[],following:[],messages:{},pic:"empty.jpg"};
  saveUsers(users);

  signupError.innerText="Account created. Login.";
}

/* LOGIN */
function login(){
  let users=getUsers();
  let u=loginUser.value;
  let p=loginPass.value;

  if(!users[u]||users[u].password!==p){
    loginError.innerText="Incorrect login";
    return;
  }

  currentUser=u;
  showScreen("app");
  loadFeed();
  loadProfile();
}

/* LOGOUT */
function logout(){
  currentUser=null;
  location.reload();
}

/* VERIFIED */
function isVerified(user){
  let users=getUsers();
  return (users[user]?.followers.length||0)>=100;
}

/* FOLLOW */
function toggleFollow(user){
  let users=getUsers();

  if(user===currentUser) return;

  if(!users[currentUser].following.includes(user)){
    users[currentUser].following.push(user);
    users[user].followers.push(currentUser);
  } else {
    users[currentUser].following =
      users[currentUser].following.filter(x=>x!==user);
    users[user].followers =
      users[user].followers.filter(x=>x!==currentUser);
  }

  saveUsers(users);
  loadFeed();
  loadProfile();
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value.trim();
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    time:new Date().toLocaleString(),
    likes:[]
  });

  saveUsers(users);
  postText.value="";
  loadFeed();
}

/* LIKE FIX */
function upvote(id){
  let users=getUsers();

  Object.values(users).forEach(u=>{
    u.posts.forEach(p=>{
      if(p.id===id){
        p.likes ||= [];
        if(!p.likes.includes(currentUser))
          p.likes.push(currentUser);
        else
          p.likes=p.likes.filter(x=>x!==currentUser);
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE */
function deletePost(id,owner){
  if(owner!==currentUser) return;

  let users=getUsers();
  users[currentUser].posts =
    users[currentUser].posts.filter(p=>p.id!==id);

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div>
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
          ${isVerified(p.user)?'<img class="verified" src="verified.png">':''}
        </span>
        <button class="follow-btn" onclick="toggleFollow('${p.user}')">Follow</button>
      </div>

      <div>${p.text}</div>

      <div class="upvote" onclick="upvote(${p.id})">
        ▲ ${p.likes.length}
      </div>

      <div style="font-size:11px;color:#777;">${p.time}</div>

      ${p.user===currentUser?
        `<div class="delete" onclick="deletePost(${p.id},'${p.user}')">delete</div>`
        :""}
    `;

    posts.appendChild(div);
  });
}

/* PROFILE */
function openProfile(user){
  viewingUser=user;
  loadProfile();
}

function loadProfile(){
  let users=getUsers();
  let u=users[viewingUser||currentUser];

  profileName.innerHTML=
    "@"+(viewingUser||currentUser)+
    (isVerified(viewingUser||currentUser)?
      ' <img class="verified" src="verified.png">':"");

  profilePic.src=u.pic;
  profileFollowers.innerText="Followers: "+u.followers.length;
}

/* MESSAGES FIX (TRUE 2-WAY) */
function sendMessage(){
  let users=getUsers();
  let to=msgUser.value.trim();
  let text=msgText.value.trim();

  if(!users[to]||!text) return;

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  let msg={from:currentUser,text};

  users[currentUser].messages[to].push(msg);
  users[to].messages[currentUser].push(msg);

  saveUsers(users);

  loadInbox();
  loadChat(to);
}

function loadInbox(){
  let users=getUsers();
  messageList.innerHTML="";

  let convos=users[currentUser].messages;

  Object.keys(convos).forEach(user=>{
    let div=document.createElement("div");
    div.innerText="@"+user;
    div.onclick=()=>loadChat(user);
    messageList.appendChild(div);
  });
}

function loadChat(user){
  let users=getUsers();
  chatBox.innerHTML="";

  let msgs=users[currentUser].messages[user]||[];

  msgs.forEach(m=>{
    let div=document.createElement("div");
    div.innerText=m.from+": "+m.text;
    chatBox.appendChild(div);
  });
}
</script>

</body>
</html>
