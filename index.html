<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.topbar button {
  background:#3b5998;
  color:white;
  border:none;
  margin-left:6px;
  cursor:pointer;
}

/* LAYOUT */
.container {
  display:flex;
  max-width:1200px;
  margin:20px auto;
  gap:10px;
}

.feed { flex:1; }
.profile { width:260px; }

.card {
  background:white;
  padding:12px;
  border-radius:5px;
}

/* POSTS */
.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user {
  font-weight:bold;
  color:#3b5998;
}

/* BUTTONS */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
  width:auto;
}

/* DELETE */
.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  color:red;
  font-size:11px;
  cursor:pointer;
}

/* PROFILE */
.profile-pic {
  width:90px;
  height:90px;
  border-radius:6px;
  object-fit:cover;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div onclick="goHome()" style="cursor:pointer;">WUPHF</div>

  <div>
    <button onclick="showFeed()">Feed</button>
    <button onclick="openSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="card" style="max-width:400px;margin:80px auto;">
  <h2>just WUPHF it.</h2>
  <p>whenever. wherever.</p>

  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">

  <button onclick="login()">Login</button>
  <button onclick="createAccount()">Create Account</button>

  <div id="error" style="color:red;"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="card" style="display:none;max-width:500px;margin:40px auto;">
  <h2>Settings</h2>
  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="container">

  <!-- FEED -->
  <div class="feed card">
    <h3>Feed</h3>

    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>

    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div class="profile card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic">
    <input type="file" onchange="uploadPic(event)">

    <p id="profileName"></p>
    <p id="followers"></p>
  </div>

</div>
</div>

<script>

let currentUser=null;

/* USERS */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* LOGIN (FIXED PROPERLY) */
function login(){
  let users=getUsers();
  let u=username.value;
  let p=password.value;

  if(!users[u]){
    error.innerText="User not found";
    return;
  }

  if(users[u].password!==p){
    error.innerText="Wrong password";
    return;
  }

  currentUser=u;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  loadFeed();
  loadProfile();
}

/* CREATE ACCOUNT */
function createAccount(){
  let users=getUsers();

  users[username.value]={
    password:password.value,
    posts:[],
    followers:[],
    pic:""
  };

  saveUsers(users);
}

/* NAV */
function showFeed(){
  document.getElementById("settings").style.display="none";
  document.getElementById("app").style.display="block";
}

/* SETTINGS */
function openSettings(){
  document.getElementById("app").style.display="none";
  document.getElementById("settings").style.display="block";
}

function setTheme(t){
  document.body.className=t;
}

/* HOME FIX */
function goHome(){
  if(currentUser){
    document.getElementById("settings").style.display="none";
    document.getElementById("app").style.display="block";
  }
}

/* POSTS */
function addPost(){
  let users=getUsers();

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:postText.value,
    likes:0,
    time:new Date().toLocaleString()
  });

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>{
    if(u.posts) all.push(...u.posts);
  });

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user">@${p.user}</div>
      <div>${p.text}</div>
      <div style="font-size:11px">${p.time}</div>

      <button onclick="like(${p.id})">▲ ${p.likes}</button>

      ${p.user===currentUser?
        `<div class="delete" onclick="del(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* LIKE */
function like(id){
  let users=getUsers();

  Object.values(users).forEach(u=>{
    (u.posts||[]).forEach(p=>{
      if(p.id===id) p.likes++;
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE */
function del(id){
  let users=getUsers();
  users[currentUser].posts=users[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(users);
  loadFeed();
}

/* PROFILE FIX */
function loadProfile(){
  let users=getUsers();
  let u=users[currentUser];

  profilePic.src=u.pic||"";
  profileName.innerHTML="<b>@"+currentUser+"</b>";
  followers.innerText="Followers: "+(u.followers?.length||0);
}

/* PROFILE PIC FIX (THIS WAS BROKEN BEFORE) */
function uploadPic(e){
  let file=e.target.files[0];
  let r=new FileReader();

  r.onload=()=>{
    let users=getUsers();
    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };

  r.readAsDataURL(file);
}

/* LOGOUT */
function logout(){
  location.reload();
}

</script>

</body>
</html>
