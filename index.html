<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>

/* THEMES */
body.light { margin:0; font-family:Tahoma; background:linear-gradient(#dfe7f3,#f5f6f7); }
body.dark { margin:0; font-family:Tahoma; background:#1c1c1c; color:white; }
body.dynamic { margin:0; font-family:Tahoma; background:linear-gradient(135deg,#141e30,#243b55); color:white; }

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.nav button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  margin-left:6px;
  cursor:pointer;
}

/* LAYOUT */
.screen { display:none; }

.container {
  display:flex;
  gap:10px;
  max-width:1400px;
  margin:20px auto;
}

/* FEED WIDE */
.feed { flex:1; }

/* PROFILE RIGHT */
.profile { width:260px; }

/* CARD */
.card {
  background:white;
  padding:12px;
  border-radius:4px;
}

body.dark .card,
body.dynamic .card { background:#2a2a2a; }

/* INPUT */
input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border-radius:3px;
  border:1px solid #ccc;
  box-sizing:border-box;
  resize:none;
}

/* POSTS */
.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user {
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

.follow-btn {
  width:auto;
  font-size:11px;
  padding:3px 6px;
}

/* LIKE */
button.like {
  width:auto;
  margin-top:6px;
}

/* DELETE */
.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

/* PROFILE */
.profile-pic {
  width:90px;
  height:90px;
  border-radius:6px;
  object-fit:cover;
}

.verified { color:#f5c542; font-weight:bold; }

/* LOGIN */
.login-title {
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

/* MESSAGES MODERN */
#messages {
  display:flex;
  max-width:1200px;
  margin:20px auto;
  gap:10px;
}

.chat-list {
  width:220px;
  background:white;
  padding:10px;
}

.chat-window {
  flex:1;
  background:white;
  padding:10px;
}

body.dark .chat-list,
body.dark .chat-window,
body.dynamic .chat-list,
body.dynamic .chat-window {
  background:#2a2a2a;
}

</style>
</head>

<body class="light">

<!-- TOP BAR (ALWAYS ACTIVE) -->
<div class="topbar">
  <div onclick="goHome()" style="cursor:pointer;">WUPHF</div>

  <div class="nav">
    <button onclick="show('feed')">Feed</button>
    <button onclick="show('messages')">Messages</button>
    <button onclick="openSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="screen card" style="display:block; max-width:400px; margin:80px auto;">
  <div class="login-title">log in to account</div>
  <p>whenever. wherever.</p>
  <input id="loginUser">
  <input id="loginPass" type="password">
  <div id="loginError" style="color:red"></div>
  <button onclick="login()">Login</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen card" style="max-width:600px; margin:40px auto;">
  <h2>Settings</h2>
  <h3>Themes</h3>
  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('dynamic')">Dynamic</button>
</div>

<!-- APP -->
<div id="app" class="screen">

<div class="container">

  <!-- FEED -->
  <div id="feed" class="feed card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div class="profile card">
    <h3>Profile</h3>
    <img id="profilePic" class="profile-pic">
    <input type="file" onchange="updatePic(event)">
    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

</div>

<!-- MESSAGES (MODERN LAYOUT) -->
<div id="messages" style="display:none;">
  <div class="chat-list" id="chatList"></div>
  <div class="chat-window">
    <div id="chatBox"></div>
    <input id="msgText">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>

let currentUser=null;
let viewingUser=null;
let activeChat=null;
let liked={};

/* NAV SAFE */
function show(tab){
  document.getElementById("feed").style.display="none";
  document.getElementById("messages").style.display="none";

  if(tab==="feed"){
    document.getElementById("app").style.display="block";
    document.getElementById("feed").style.display="block";
    loadFeed();
  }

  if(tab==="messages"){
    document.getElementById("app").style.display="none";
    document.getElementById("messages").style.display="flex";
    loadChats();
  }

  loadProfile();
}

/* HOME FIX */
function goHome(){
  show("feed");
}

/* THEME */
function setTheme(t){
  document.body.className=t;
}

/* LOGIN */
function login(){
  currentUser=loginUser.value;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  show("feed");
}

/* POSTS */
function addPost(){
  let users=getUsers();
  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:postText.value,
    likes:0,
    time:new Date().toLocaleString()
  });
  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user-row">
        <div class="user">@${p.user}</div>
        <button onclick="toggleFollow('${p.user}')">Follow</button>
      </div>

      <div>${p.text}</div>
      <div style="font-size:11px">${p.time}</div>

      <button class="like" onclick="like(${p.id})">▲ ${p.likes}</button>

      ${p.user===currentUser?`<div class="delete" onclick="del(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* LIKE FIX */
function like(id){
  if(!liked[currentUser]) liked[currentUser]={};
  if(liked[currentUser][id]) return;

  liked[currentUser][id]=true;

  let users=getUsers();
  Object.values(users).forEach(u=>{
    u.posts.forEach(p=>{
      if(p.id===id) p.likes++;
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE */
function del(id){
  let users=getUsers();
  users[currentUser].posts=users[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(users);
  loadFeed();
}

/* MESSAGES FIXED */
function loadChats(){
  chatList.innerHTML="";
  chatBox.innerHTML="";
}

/* PROFILE */
function loadProfile(){
  let users=getUsers();
  let u=users[currentUser];

  profileName.innerHTML=`@${currentUser}`;
  profileFollowers.innerText="Followers: "+u.followers.length;
}

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
