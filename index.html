<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
}

/* TOP BAR */
.topbar {
  background: #3b5998;
  color: white;
  padding: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout-btn {
  cursor: pointer;
  background: #2d4373;
  border: none;
  color: white;
  padding: 5px 10px;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  flex-direction: row;
  gap: 10px;
  padding: 10px;
}

/* PROFILE SECTION */
.profile {
  width: 220px;
  background: white;
  border: 2px solid #c0c0c0; /* FIXED BORDER */
  padding: 10px;
  height: fit-content;
}

.profile-pic {
  width: 100%;
  height: 150px;
  background: #ddd;
  border: 2px solid #999; /* FIXED BORDER VISIBILITY */
  margin-bottom: 10px;
}

/* FEED */
.feed {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* POST */
.post {
  background: white;
  border: 1px solid #c0c0c0;
  padding: 10px;
  position: relative;
}

/* THREE DOT MENU */
.post-menu {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
}

.post-menu:hover .dropdown {
  display: block;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  background: white;
  border: 1px solid #ccc;
  z-index: 10;
}

.dropdown div {
  padding: 5px 10px;
  cursor: pointer;
}

.dropdown div:hover {
  background: #eee;
}

/* LOGIN SCREEN */
.login {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #dfe7f3;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 20px;
  border: 2px solid #3b5998;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-box">
    <h3>WUPHF Login</h3>
    <input id="username" placeholder="Username"/><br/><br/>
    <input id="password" type="password" placeholder="Password"/><br/><br/>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div>WUPHF</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="container" id="app" style="display:none;">

  <!-- PROFILE -->
  <div class="profile">
    <div class="profile-pic"></div>
    <div id="profileName">@user</div>
  </div>

  <!-- FEED -->
  <div class="feed" id="feed">

    <div class="post">
      <div class="post-menu">
        ⋯
        <div class="dropdown">
          <div onclick="deletePost(this)">Delete</div>
        </div>
      </div>
      First WUPHF post 🚀
    </div>

  </div>

</div>

<script>
function login() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

function logout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("app").style.display = "none";
}

function deletePost(el) {
  el.closest(".post").remove();
}
</script>

</body>
</html>
