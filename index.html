<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
  color: #1c1e21;
}

.topbar {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  display: none;
  flex-direction: row;
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.sidebar { width: 160px; }
#feed, #messages { flex: 1; }
#profile { width: 260px; }

input, button, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border: 1px solid #ccd0d5;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  background: #3b5998;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

textarea { height: 80px; resize: none; }

.user {
  font-weight: bold;
  color: #3b5998;
  cursor: pointer;
}

.post {
  padding: 10px 0;
  border-top: 1px solid #eee;
}

.actions {
  font-size: 12px;
}

.upvote {
  cursor: pointer;
}

.follow-btn {
  font-size: 11px;
  width: auto;
  padding: 3px 6px;
}

.profile-pic {
  width: 90px;
  height: 90px;
  border-radius: 6px;
  object-fit: cover;
  border: 2px solid #999;
}

.verified {
  width: 14px;
  vertical-align: middle;
}

.inbox-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.chat-box {
  border: 1px solid #ddd;
  padding: 10px;
  height: 200px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar card">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('messages')">Inbox</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="card" style="display:none;">
    <h3>Inbox</h3>

    <div id="inbox"></div>

    <div id="chat" style="display:none;">
      <h4 id="chatWith"></h4>
      <div class="chat-box" id="chatBox"></div>

      <textarea id="msgText"></textarea>
      <button onclick="sendReply()">Reply</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" />

    <input type="file" id="profileUpload" />
    <button onclick="updateProfile()">Update</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;
let viewingUser = null;
let openChatUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGIN */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      posts: [],
      followers: [],
      following: [],
      messages: {}
    };
  }

  if (users[u].password !== p) return alert("Wrong password");

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "flex";

  showTab("feed");
  loadFeed();
  loadProfile();
  loadInbox();
}

function logout() {
  location.reload();
}

function goHome() {
  viewingUser = null;
  showTab("feed");
}

/* NAV */
function showTab(tab) {
  feed.style.display = tab === "feed" ? "block" : "none";
  messages.style.display = tab === "messages" ? "block" : "none";
  profile.style.display = "block";

  if (tab === "messages") loadInbox();
}

/* VERIFIED (100 FOLLOWERS RULE) */
function isVerified(user) {
  let users = getUsers();
  return (users[user]?.followers?.length || 0) >= 100;
}

/* FOLLOW */
function toggleFollow(user) {
  let users = getUsers();

  users[currentUser].following ||= [];
  users[user].followers ||= [];

  if (!users[currentUser].following.includes(user)) {
    users[currentUser].following.push(user);
    users[user].followers.push(currentUser);
  } else {
    users[currentUser].following =
      users[currentUser].following.filter(x => x !== user);

    users[user].followers =
      users[user].followers.filter(x => x !== currentUser);
  }

  saveUsers(users);
  loadProfile();
  loadFeed();
}

/* POSTS */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    likes: []
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* UPVOTE */
function upvote(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];
        if (!p.likes.includes(currentUser)) {
          p.likes.push(currentUser);
        } else {
          p.likes = p.likes.filter(x => x !== currentUser);
        }
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a, b) => b.id - a.id);

  posts.forEach(p => {
    let verified = isVerified(p.user);

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div>
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
          ${verified ? '<img class="verified" src="verified.png">' : ''}
        </span>

        <button class="follow-btn" onclick="toggleFollow('${p.user}')">
          Follow
        </button>
      </div>

      <div>${p.text}</div>

      <div class="actions">
        <span class="upvote" onclick="upvote(${p.id})">▲ ${p.likes?.length || 0}</span>
      </div>
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[viewingUser || currentUser];

  profileName.innerHTML =
    "@" + (viewingUser || currentUser) +
    (isVerified(viewingUser || currentUser) ? ' <img class="verified" src="verified.png">' : '');

  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* PROFILE VIEW */
function openProfile(user) {
  viewingUser = user;
  loadProfile();
  showTab("feed");
}

/* PROFILE UPLOAD */
function updateProfile() {
  let users = getUsers();

  let file = profileUpload.files[0];
  if (!file) return;

  let r = new FileReader();
  r.onload = e => {
    users[currentUser].pic = e.target.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}

/* ================= MESSAGES (INBOX SYSTEM) ================= */

function loadInbox() {
  let users = getUsers();
  let inbox = document.getElementById("inbox");
  inbox.innerHTML = "";

  let msgs = users[currentUser].messages || {};

  Object.keys(msgs).forEach(user => {
    let div = document.createElement("div");
    div.className = "inbox-item";
    div.innerText = "@" + user;
    div.onclick = () => openChat(user);
    inbox.appendChild(div);
  });
}

function openChat(user) {
  openChatUser = user;

  document.getElementById("chat").style.display = "block";
  document.getElementById("chatWith").innerText = "Chat with @" + user;

  loadChat();
}

function loadChat() {
  let users = getUsers();
  let chat = document.getElementById("chatBox");
  chat.innerHTML = "";

  let msgs = users[currentUser].messages?.[openChatUser] || [];

  msgs.forEach(m => {
    let div = document.createElement("div");
    div.innerHTML = `<b>${m.from}</b>: ${m.text}`;
    chat.appendChild(div);
  });
}

function sendReply() {
  let users = getUsers();

  users[currentUser].messages ||= {};
  users[openChatUser].messages ||= {};

  let msg = {
    from: currentUser,
    text: msgText.value
  };

  if (!users[currentUser].messages[openChatUser])
    users[currentUser].messages[openChatUser] = [];

  if (!users[openChatUser].messages[currentUser])
    users[openChatUser].messages[currentUser] = [];

  users[currentUser].messages[openChatUser].push(msg);
  users[openChatUser].messages[currentUser].push(msg);

  saveUsers(users);
  msgText.value = "";
  loadChat();
}
</script>

</body>
</html>
