<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
  color: #1c1e21;
}

.topbar {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
  display: flex;
  justify-content: space-between;
}

.logo {
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  display: none;
  flex-direction: row;
  gap: 10px;
  align-items: flex-start;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  border: none;
}

.sidebar {
  width: 160px;
}

#feed, #messages {
  flex: 1;
  min-width: 0;
}

#profile {
  width: 260px;
}

input, button, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border: 1px solid #ccd0d5;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

textarea {
  height: 80px;
  resize: none;
}

.user {
  font-weight: bold;
  color: #3b5998;
  cursor: pointer;
}

.post-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.like-btn {
  color: #3b5998;
  cursor: pointer;
  margin-right: 10px;
}

.delete-btn {
  color: red;
  cursor: pointer;
  font-size: 12px;
}

.small {
  font-size: 11px;
  color: #777;
}

.profile-pic {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  border: 2px solid #999;
}

.verified {
  width: 14px;
  vertical-align: middle;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo" onclick="goHome()">WUPHF</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="sidebar">
    <div class="card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="card" style="display:none;">
    <h3>Messages</h3>
    <input id="msgUser" placeholder="Send to username" />
    <textarea id="msgText" placeholder="Message..."></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="messageList"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card">
    <h3>Profile</h3>

    <div style="position:relative; width:90px; height:90px;">
      <img id="profilePic" class="profile-pic" />
    </div>

    <input type="file" id="profileUpload" />

    <p id="profileName" style="font-weight:bold;"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;
let currentTab = "feed";

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* HOME FIX */
function goHome() {
  showTab("feed");
}

/* TAB SYSTEM FIXED */
function showTab(tab) {
  currentTab = tab;

  feed.style.display = (tab === "feed") ? "block" : "none";
  messages.style.display = (tab === "messages") ? "block" : "none";

  // FIX: profile should ALWAYS stay visible unless logging out
  profile.style.display = "block";
}

/* LOGIN */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      posts: [],
      followers: [],
      following: [],
      messages: []
    };
  } else if (users[u].password !== p) {
    alert("Wrong password");
    return;
  }

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "flex";

  loadProfile();
  loadFeed();
  loadMessages();

  showTab("feed");
}

function logout() {
  location.reload();
}

/* PROFILE VIEW FIX */
function openProfile(user) {
  let users = getUsers();
  let u = users[user];
  if (!u) return;

  showTab("profile");

  profileName.innerHTML =
    "@" + user +
    ((u.followers?.length || 0) >= 5 ? ' <img class="verified" src="verified.png">' : '');

  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* FEED */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a, b) => b.id - a.id);

  posts.forEach(p => {
    let verified = (users[p.user]?.followers?.length || 0) >= 5;

    let div = document.createElement("div");

    div.innerHTML = `
      <div class="post-header">
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
          ${verified ? '<img class="verified" src="verified.png">' : ''}
        </span>
      </div>

      <div>${p.text}</div>

      <div>
        <span class="like-btn" onclick="likePost(${p.id})">
          👍 ${p.likes?.length || 0}
        </span>

        <span class="delete-btn" onclick="deletePost(${p.id})">
          🗑 Delete
        </span>
      </div>

      <div class="small">${p.time}</div>
      <hr>
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[currentUser];

  profileName.innerHTML =
    "@" + currentUser +
    ((u.followers?.length || 0) >= 5 ? ' <img class="verified" src="verified.png">' : '');

  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* MESSAGES */
function sendMessage() {
  let users = getUsers();

  if (!users[msgUser.value]) return alert("User not found");

  users[msgUser.value].messages ||= [];
  users[msgUser.value].messages.push({
    from: currentUser,
    text: msgText.value,
    time: new Date().toLocaleString()
  });

  saveUsers(users);
  msgText.value = "";
  loadMessages();
}

function loadMessages() {
  let users = getUsers();
  let box = document.getElementById("messageList");
  box.innerHTML = "";

  let msgs = users[currentUser]?.messages || [];

  msgs.forEach(m => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>@${m.from}</b><br>${m.text}<br><span class="small">${m.time}</span>`;
    box.appendChild(div);
  });
}

/* POSTS */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    likes: [],
    time: new Date().toLocaleString()
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* LIKE */
function likePost(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];
        if (!p.likes.includes(currentUser)) {
          p.likes.push(currentUser);
        } else {
          p.likes = p.likes.filter(x => x !== currentUser);
        }
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE */
function deletePost(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    if (u.posts) {
      u.posts = u.posts.filter(p =>
        !(p.id === id && (p.user === currentUser || currentUser === "wuphf"))
      );
    }
  });

  saveUsers(users);
  loadFeed();
}
</script>

</body>
</html>
