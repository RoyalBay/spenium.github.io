<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<!-- ONLY CHANGE: FAVICON -->
<link rel="icon" type="image/png" href="wicon.png">

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

/* ORIGINAL TOP BAR STYLE */
.topbar{
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
}

/* FIX TEXTBOX SIZE ISSUE (YOU REPORTED THIS BREAK) */
input{
  width:100%;
  padding:8px;
  margin:6px 0;
  box-sizing:border-box;
}

/* BUTTONS BACK TO ORIGINAL BLUE STYLE */
button{
  width:100%;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

button.secondary{
  background:#3b5998;
}

/* LOGIN BOX */
.center{
  max-width:400px;
  margin:80px auto;
  text-align:center;
}
</style>
</head>

<body>

<!-- RESTORED TOP BAR + LOGO AREA -->
<div class="topbar">
  <img src="Facebook.jpg" style="height:28px;">
  <span>WUPHF</span>
</div>

<!-- LOGIN SCREEN (UNCHANGED STRUCTURE) -->
<div class="center">

  <h2>Login</h2>

  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">

  <div id="loginError" style="color:red;font-size:12px;"></div>

  <button onclick="login()">Login</button>
  <button onclick="createAccount()" class="secondary">Create Account</button>

</div>

<script>

function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}

function login(){
  let users=getUsers();

  let u=loginUser.value.trim();
  let p=loginPass.value;

  if(!users[u]){
    loginError.innerText="Incorrect username";
    return;
  }

  if(users[u].password!==p){
    loginError.innerText="Incorrect password";
    return;
  }

  localStorage.setItem("currentUser",u);
  location.href="feed.html";
}

function createAccount(){
  let users=getUsers();

  let u=loginUser.value.trim();
  let p=loginPass.value;

  if(users[u]){
    loginError.innerText="Username already exists";
    return;
  }

  users[u]={
    password:p,
    posts:[],
    followers:[],
    pic:""
  };

  localStorage.setItem("users",JSON.stringify(users));
  loginError.innerText="Account created. Please login.";
}

</script>

</body>
</html>
