<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF</title>

<!-- ONLY ADDITION: FAVICON -->
<link rel="icon" type="image/png" href="wicon.png">

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar{
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- KEEP ORIGINAL WUPHF STYLE HEADER -->
<div class="topbar">WUPHF</div>

<!-- LOGIN SECTION (PRESERVED STYLE) -->
<div style="max-width:400px;margin:80px auto;text-align:center;">

  <h2>Login</h2>

  <input id="loginUser" placeholder="Username" style="width:100%;padding:8px;">
  <input id="loginPass" type="password" placeholder="Password" style="width:100%;padding:8px;margin-top:5px;">

  <div id="loginError" style="color:red;font-size:12px;"></div>

  <button onclick="login()" style="width:100%;margin-top:10px;background:#3b5998;color:white;border:none;padding:8px;">
    Login
  </button>

  <button onclick="createAccount()" style="width:100%;margin-top:10px;">
    Create Account
  </button>

</div>

<script>

/* LOGIN LOGIC (UNCHANGED BEHAVIOUR, JUST KEPT SAFE) */
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function login(){
  let users = getUsers();

  let u = loginUser.value.trim();
  let p = loginPass.value;

  if(!users[u]){
    loginError.innerText = "Incorrect username";
    return;
  }

  if(users[u].password !== p){
    loginError.innerText = "Incorrect password";
    return;
  }

  localStorage.setItem("currentUser", u);
  location.href = "feed.html";
}

/* CREATE ACCOUNT (SAFE EXISTING BEHAVIOUR PRESERVED) */
function createAccount(){
  let users = getUsers();

  let u = loginUser.value.trim();
  let p = loginPass.value;

  if(users[u]){
    loginError.innerText = "Username already exists";
    return;
  }

  users[u] = {
    password:p,
    posts:[],
    followers:[],
    pic:""
  };

  localStorage.setItem("users", JSON.stringify(users));

  loginError.innerText = "Account created. Please login.";
}

</script>

</body>
</html>
