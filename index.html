<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
  color: #1c1e21;
}

.topbar {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  display: none;
  flex-direction: row;
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.sidebar { width: 160px; }
#feed, #messages { flex: 1; }
#profile { width: 260px; }

input, button, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border: 1px solid #ccd0d5;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  background: #3b5998;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

textarea { height: 80px; resize: none; }

.user {
  font-weight: bold;
  color: #3b5998;
  cursor: pointer;
}

.post {
  border-top: 1px solid #eee;
  padding: 10px 0;
}

.post-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 5px;
  font-size: 12px;
}

.upvote {
  cursor: pointer;
  color: #444;
}

.follow-btn {
  font-size: 11px;
  padding: 3px 6px;
  width: auto;
}

.small {
  font-size: 11px;
  color: #777;
}

.profile-pic {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  border: 2px solid #999;
}

.verified {
  width: 14px;
  vertical-align: middle;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="sidebar">
    <div class="card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="card" style="display:none;">
    <h3>Messages</h3>
    <input id="msgUser" placeholder="To user" />
    <textarea id="msgText"></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="messageList"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" />

    <input type="file" id="profileUpload" />
    <button onclick="updateProfile()">Update</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;
let viewingUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGIN */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      posts: [],
      followers: [],
      following: [],
      messages: []
    };
  }

  if (users[u].password !== p) return alert("Wrong password");

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "flex";

  showTab("feed");
  loadProfile();
  loadFeed();
}

/* NAV */
function showTab(tab) {
  feed.style.display = tab === "feed" ? "block" : "none";
  messages.style.display = tab === "messages" ? "block" : "none";
  profile.style.display = "block";
}

function goHome() {
  viewingUser = null;
  loadProfile();
  showTab("feed");
}

function logout() {
  location.reload();
}

/* PROFILE */
function openProfile(user) {
  viewingUser = user;
  loadProfile();
  showTab("feed");
}

/* FOLLOW */
function toggleFollow(user) {
  let users = getUsers();

  users[currentUser].following ||= [];
  users[user].followers ||= [];

  if (!users[currentUser].following.includes(user)) {
    users[currentUser].following.push(user);
    users[user].followers.push(currentUser);
  } else {
    users[currentUser].following =
      users[currentUser].following.filter(x => x !== user);

    users[user].followers =
      users[user].followers.filter(x => x !== currentUser);
  }

  saveUsers(users);
  loadProfile();
  loadFeed();
}

/* POST */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    likes: [],
    time: new Date().toLocaleString()
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* LIKE (REDESIGNED - SIMPLE UPVOTE) */
function upvote(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];
        if (!p.likes.includes(currentUser)) {
          p.likes.push(currentUser);
        } else {
          p.likes = p.likes.filter(x => x !== currentUser);
        }
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* FEED (FIXED LINKS + FOLLOW BUTTON + UPVOTE) */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a, b) => b.id - a.id);

  posts.forEach(p => {
    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post-header">
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
        </span>

        <button class="follow-btn" onclick="toggleFollow('${p.user}')">
          Follow
        </button>
      </div>

      <div>${p.text}</div>

      <div class="actions">
        <span class="upvote" onclick="upvote(${p.id})">▲ ${p.likes?.length || 0}</span>
      </div>
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[viewingUser || currentUser];

  profileName.innerHTML = "@" + (viewingUser || currentUser);
  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* PROFILE IMAGE */
function updateProfile() {
  let users = getUsers();

  let file = profileUpload.files[0];
  if (!file) return;

  let r = new FileReader();
  r.onload = e => {
    users[currentUser].pic = e.target.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}
</script>

</body>
</html>
