<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  padding:12px;
  font-weight:bold;
}

/* CARD */
.card{
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:15px;
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  box-sizing:border-box;
}

/* BUTTONS */
button{
  width:100%;
  padding:10px;
  background:#3b5998;
  color:white;
  border:none;
  margin-top:6px;
  cursor:pointer;
}

/* HIDDEN SCREEN */
.hidden{display:none;}
</style>
</head>

<body>

<div class="topbar">WUPHF</div>

<!-- LOGIN SCREEN -->
<div id="login" class="card">
  <h3>Login</h3>

  <input id="l_user" placeholder="username">
  <input id="l_pass" type="password" placeholder="password">

  <button onclick="login()">Login</button>
  <button onclick="showSignup()">Create Account</button>

  <p id="err" style="color:red;"></p>
</div>

<!-- SIGNUP SCREEN -->
<div id="signup" class="card hidden">
  <h3>Create Account</h3>

  <input id="s_user" placeholder="username">
  <input id="s_pass" type="password" placeholder="password">

  <button onclick="signup()">Create</button>
  <button onclick="back()">Back</button>

  <p id="err2" style="color:red;"></p>
</div>

<script>

function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* LOGIN FIX */
function login(){
  let u=getUsers();

  let name=l_user.value.trim();
  let pass=l_pass.value;

  if(!u[name]){
    err.innerText="User not found";
    return;
  }

  if(u[name].password!==pass){
    err.innerText="Wrong password";
    return;
  }

  localStorage.setItem("currentUser",name);
  window.location.href="feed.html";
}

/* SWITCH SCREEN */
function showSignup(){
  login.classList.add("hidden");
  signup.classList.remove("hidden");
}

function back(){
  signup.classList.add("hidden");
  login.classList.remove("hidden");
}

/* CREATE ACCOUNT */
function signup(){
  let u=getUsers();

  let name=s_user.value.trim();
  let pass=s_pass.value;

  if(!name||!pass){
    err2.innerText="fill all fields";
    return;
  }

  if(u[name]){
    err2.innerText="username exists";
    return;
  }

  u[name]={
    password:pass,
    posts:[],
    followers:[],
    pic:""
  };

  saveUsers(u);
  back();
}

</script>

</body>
</html>
