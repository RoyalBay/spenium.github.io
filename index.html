<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body.light {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

body.dark {
  margin:0;
  font-family:Tahoma;
  background:#1c1c1c;
  color:white;
}

body.cool {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

#logoutBtn {
  width:auto;
  padding:5px 10px;
  background:#2d4373;
  border:none;
  color:white;
  cursor:pointer;
}

.screen { display:none; }

.center {
  max-width:420px;
  margin:80px auto;
}

.container {
  max-width:1050px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

body.dark .card,
body.cool .card {
  background:#2a2a2a;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
}

button {
  padding:6px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user {
  color:#3b5998;
  font-weight:bold;
  cursor:pointer;
}

.follow-btn {
  width:auto;
  font-size:11px;
}

.like-btn {
  width:auto;
  font-size:11px;
  margin-top:5px;
}

.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

.profile-pic {
  width:90px;
  height:90px;
  border-radius:6px;
  object-fit:cover;
}

.verified {
  font-weight:bold;
  color:#f5c542;
}
</style>
</head>

<body class="light">

<div class="topbar" onclick="goHome()">
  WUPHF
  <button id="logoutBtn" onclick="logout()">Logout</button>
</div>

<!-- WELCOME -->
<div id="welcome" class="screen center card" style="display:block;">
  <h2>just WUPHF it.</h2>
  <p>whenever. wherever.</p>
  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center card">
  <h3>Login</h3>
  <input id="loginUser">
  <input id="loginPass" type="password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen center card">
  <h3>Create Account</h3>
  <input id="signupUser">
  <input id="signupPass" type="password">
  <div id="signupError"></div>
  <button onclick="createAccount()">Create</button>
</div>

<!-- APP -->
<div id="app" class="screen">
<div class="container">

  <div class="sidebar card">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('messages')">Messages</button>
    <button onclick="toggleSettings()">Settings</button>
    <div id="settings" style="display:none;">
      <button onclick="setTheme('light')">Light</button>
      <button onclick="setTheme('dark')">Dark</button>
      <button onclick="setTheme('cool')">Cool</button>
    </div>
  </div>

  <div id="feed" class="feed card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <div id="messages" class="feed card" style="display:none;">
    <h3>Messages</h3>
    <input id="msgUser">
    <textarea id="msgText"></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="messageList"></div>
    <div id="chatBox"></div>
  </div>

  <div id="profile" class="profile card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" src="empty.jpg">
    <input type="file" onchange="updatePic(event)">
    <button onclick="refreshProfile()">Update Profile</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>

    <div id="followArea"></div>
  </div>

</div>
</div>

<script>

let currentUser=null;
let viewingUser=null;

/* THEME */
function setTheme(t){
  document.body.className=t;
  localStorage.setItem("theme",t);
}

/* SETTINGS */
function toggleSettings(){
  let s=document.getElementById("settings");
  s.style.display=s.style.display==="block"?"none":"block";
}

/* NAV */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function showTab(tab){
  feed.style.display="none";
  messages.style.display="none";
  document.getElementById(tab).style.display="block";
  if(tab==="feed") loadFeed();
  if(tab==="messages") loadInbox();
  loadProfile();
}

function goHome(){
  if(currentUser){
    viewingUser=null;
    showScreen("app");
    showTab("feed");
  } else showScreen("welcome");
}

/* STORAGE */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");
  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
    u[k].verified ||= false;
  });
  return u;
}
function saveUsers(u){ localStorage.setItem("users",JSON.stringify(u)); }

/* LOGIN */
function login(){
  let u=loginUser.value;
  let p=loginPass.value;
  let users=getUsers();

  loginError.innerText="";

  if(!users[u]) return loginError.innerText="Wrong username";
  if(users[u].password!==p) return loginError.innerText="Wrong password";

  currentUser=u;
  showScreen("app");
  showTab("feed");
}

/* SIGNUP */
function createAccount(){
  let u=signupUser.value;
  let p=signupPass.value;
  let users=getUsers();

  if(users[u]) return signupError.innerText="Exists";

  users[u]={password:p,posts:[],followers:[],following:[],messages:{},pic:"empty.jpg",verified:false};
  saveUsers(users);
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value;
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    likes:0
  });

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{

    let verified = users[p.user].verified ? `<span class="verified">◆</span>` : "";

    let isFollowing = users[currentUser].following.includes(p.user);

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user-row">
        <div class="user" onclick="openProfile('${p.user}')">
          @${p.user} ${verified}
        </div>

        <div>
          <button class="follow-btn" onclick="toggleFollow('${p.user}')">
            ${isFollowing?"Unfollow":"Follow"}
          </button>
        </div>
      </div>

      <div>${p.text}</div>

      <button class="like-btn" onclick="likePost(${p.id})">
        ▲ ${p.likes}
      </button>

      ${p.user===currentUser?`<div class="delete" onclick="deletePost(${p.id})">x</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* LIKE */
function likePost(id){
  let users=getUsers();

  Object.values(users).forEach(u=>{
    u.posts.forEach(p=>{
      if(p.id===id) p.likes++;
    });
  });

  saveUsers(users);
  loadFeed();
}

/* FOLLOW */
function toggleFollow(user){
  let users=getUsers();

  let me=users[currentUser];
  let them=users[user];

  if(me.following.includes(user)){
    me.following=me.following.filter(u=>u!==user);
    them.followers=them.followers.filter(u=>u!==currentUser);
  } else {
    me.following.push(user);
    them.followers.push(currentUser);
  }

  them.verified = them.followers.length>=100;

  saveUsers(users);
  loadFeed();
  loadProfile();
}

/* PROFILE */
function loadProfile(){
  let users=getUsers();
  let u=users[viewingUser||currentUser];

  if(!u) return;

  profilePic.src=u.pic;

  profileName.innerHTML=`@${viewingUser||currentUser} ${u.verified?"◆":""}`;
  profileFollowers.innerText="Followers: "+u.followers.length;

  followArea.innerHTML="";
}

/* PROFILE PIC */
function updatePic(e){
  let file=e.target.files[0];
  let r=new FileReader();

  r.onload=()=>{
    let users=getUsers();
    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };

  r.readAsDataURL(file);
}

/* OTHER */
function refreshProfile(){ loadProfile(); }
function openProfile(u){ viewingUser=u; loadProfile(); }
function logout(){ currentUser=null; showScreen("welcome"); }

(function(){
  document.body.className=localStorage.getItem("theme")||"light";
})();

</script>

</body>
</html>
