<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Login</title>

<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  background: linear-gradient(#dfe7f3,#f5f6f7);
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  height:44px;
  display:flex;
  align-items:center;
  padding:0 12px;
  color:white;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  height:34px;
}

/* HEADER TEXT FIX */
.title{
  text-align:center;
  margin-top:40px;
}

.title h1{
  margin:0;
  font-weight:bold;
  font-family:Tahoma;
}

/* SMALL SUBTEXT */
.title p{
  margin-top:5px;
  font-weight:normal;
  color:#444;
}

/* LOGIN BOX (UNCHANGED) */
.loginBox{
  width:300px;
  margin:80px auto;
  background:white;
  border:1px solid #ccc;
  padding:20px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  background:#3b5998;
  color:white;
  border:none;
  padding:8px;
  margin-top:6px;
  cursor:pointer;
}

#error{
  color:red;
  font-size:12px;
  margin-top:5px;
  min-height:14px;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>
</div>

<!-- ✅ FIXED HEADER TEXT (AS YOU SPECIFIED) -->
<div class="title">
  <h1>just WUPHF it.</h1>
  <p>whenever. wherever.</p>
</div>

<!-- LOGIN BOX (UNCHANGED STRUCTURE) -->
<div class="loginBox">

  <input id="username" placeholder="username">
  <input id="password" type="password" placeholder="password">

  <button onclick="login()">Enter</button>
  <button onclick="create()">Create Account</button>

  <div id="error"></div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users") || "{}");

function login(){
  let u = username.value.trim();
  let p = password.value.trim();

  if(!users[u]){
    error.innerText = "User not found";
    return;
  }

  if(users[u].password !== p){
    error.innerText = "Incorrect password";
    return;
  }

  localStorage.setItem("currentUser", u);
  location.href = "feed.html";
}

function create(){
  let u = username.value.trim();
  let p = password.value.trim();

  if(users[u]){
    error.innerText = "Username already in use";
    return;
  }

  users[u] = {
    password: p,
    followers: [],
    posts: [],
    pic: ""
  };

  localStorage.setItem("users", JSON.stringify(users));
  error.innerText = "Account created";
}

</script>

</body>
</html>
