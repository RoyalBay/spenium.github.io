<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.container {
  max-width:1050px;
  margin:20px auto;
  display:none;
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

input, textarea, button {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
  box-sizing:border-box;
}

textarea { height:70px; resize:none; }

button {
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

.user { color:#3b5998; font-weight:bold; cursor:pointer; }

.post {
  border-top:1px solid #eee;
  padding:10px 0;
}

.follow-btn {
  font-size:11px;
  width:auto;
  padding:3px 6px;
}

.upvote { cursor:pointer; font-size:12px; }

.small { font-size:11px; color:#777; }

.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  border:2px solid #999;
}

.verified { width:14px; vertical-align:middle; }
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="sidebar card">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('messages')">Messages</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- FEED -->
  <div id="feed" class="feed card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="feed card" style="display:none;">
    <h3>Inbox</h3>

    <input id="msgUser" placeholder="Username">
    <textarea id="msgText"></textarea>
    <button onclick="sendMessage()">Send</button>

    <div id="messageList"></div>
    <div id="chatBox"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="profile card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" src="empty.jpg">

    <input type="file" id="profileUpload">
    <button onclick="updateProfile()">Update</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;
let viewingUser = null;
let activeChat = null;

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* SESSION FIX */
window.onload = () => {
  let saved = localStorage.getItem("currentUser");
  if(saved){
    currentUser = saved;
    loginBox.style.display="none";
    app.style.display="flex";
    loadFeed();
    loadProfile();
  }
};

/* LOGIN */
function login(){
  let users=getUsers();
  let u=username.value;
  let p=password.value;

  loginError.innerText="";

  if(!users[u]){
    users[u]={
      password:p,
      pic:"empty.jpg",
      posts:[],
      followers:[],
      following:[],
      messages:{}
    };
  }

  if(users[u].password!==p){
    loginError.innerText="Password incorrect";
    return;
  }

  currentUser=u;
  localStorage.setItem("currentUser",u);

  loginBox.style.display="none";
  app.style.display="flex";

  loadFeed();
  loadProfile();
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

/* NAV */
function showTab(tab){
  feed.style.display = tab==="feed"?"block":"none";
  messages.style.display = tab==="messages"?"block":"none";
  if(tab==="messages") loadInbox();
}

function goHome(){
  viewingUser=null;
  showTab("feed");
  loadProfile();
}

/* VERIFIED */
function isVerified(user){
  let users=getUsers();
  return (users[user]?.followers?.length||0)>=100;
}

/* FOLLOW */
function toggleFollow(user){
  let users=getUsers();

  users[currentUser].following ||= [];
  users[user].followers ||= [];

  if(!users[currentUser].following.includes(user)){
    users[currentUser].following.push(user);
    users[user].followers.push(currentUser);
  } else {
    users[currentUser].following =
      users[currentUser].following.filter(x=>x!==user);
    users[user].followers =
      users[user].followers.filter(x=>x!==currentUser);
  }

  saveUsers(users);
  loadFeed();
  loadProfile();
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value.trim();
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    time:new Date().toLocaleString(),
    likes:[]
  });

  saveUsers(users);
  postText.value="";
  loadFeed();
}

/* LIKE */
function upvote(id){
  let users=getUsers();
  Object.values(users).forEach(u=>{
    (u.posts||[]).forEach(p=>{
      if(p.id===id){
        if(!p.likes.includes(currentUser))
          p.likes.push(currentUser);
        else
          p.likes=p.likes.filter(x=>x!==currentUser);
      }
    });
  });
  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>{
    if(u.posts) all.push(...u.posts);
  });

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div>
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
          ${isVerified(p.user)?'<img class="verified" src="verified.png">':''}
        </span>
        <button class="follow-btn" onclick="toggleFollow('${p.user}')">Follow</button>
      </div>

      <div>${p.text}</div>

      <div class="upvote" onclick="upvote(${p.id})">
        ▲ ${p.likes.length}
      </div>

      <div class="small">${p.time}</div>
    `;

    posts.appendChild(div);
  });
}

/* PROFILE */
function openProfile(user){
  viewingUser=user;
  loadProfile();
}

function loadProfile(){
  let users=getUsers();
  let u=users[viewingUser||currentUser];

  profileName.innerHTML =
    "@"+(viewingUser||currentUser)+
    (isVerified(viewingUser||currentUser)?
      ' <img class="verified" src="verified.png">':"");

  profilePic.src = u.pic || "empty.jpg";
  profileFollowers.innerText = "Followers: " + (u.followers.length);
}

/* MESSAGES */
function sendMessage(){
  let users=getUsers();
  let to=msgUser.value;
  let text=msgText.value;

  if(!users[to]||!text) return;

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  users[currentUser].messages[to].push({from:currentUser,text});
  users[to].messages[currentUser].push({from:currentUser,text});

  saveUsers(users);
  loadChat(to);
}

function loadInbox(){
  let users=getUsers();
  messageList.innerHTML="";

  let convos=users[currentUser].messages;

  Object.keys(convos).forEach(user=>{
    let div=document.createElement("div");
    div.innerText="@"+user;
    div.onclick=()=>loadChat(user);
    messageList.appendChild(div);
  });
}

function loadChat(user){
  activeChat=user;
  let users=getUsers();
  chatBox.innerHTML="";

  let msgs=users[currentUser].messages[user];

  msgs.forEach(m=>{
    let div=document.createElement("div");
    div.innerText=m.from+": "+m.text;
    chatBox.appendChild(div);
  });
}
</script>

</body>
</html>
