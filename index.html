<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
}

/* TOPBAR */
.topbar {
  background: #3b5998;
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
  cursor: pointer;
}

/* LAYOUT FIX (LEFT SHIFT + RIGHT PROFILE) */
.container {
  max-width: 1100px;
  margin: 20px auto;
  display: none;
  gap: 10px;
}

/* LEFT SIDEBAR */
.sidebar {
  width: 150px;
  float: left;
}

/* MAIN FEED (SHIFT LEFT SLIGHTLY) */
#feed {
  margin-left: 10px;
  width: 600px;
  display: inline-block;
  vertical-align: top;
}

/* RIGHT PROFILE */
#profile {
  width: 240px;
  float: right;
}

/* CARDS */
.card {
  background: white;
  padding: 15px;
  border-radius: 4px;
  margin-bottom: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

/* INPUTS */
input, button, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ccd0d5;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  background: #3b5998;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

textarea { height: 80px; resize: none; }

/* POSTS */
.post {
  border-top: 1px solid #eee;
  padding: 10px 0;
}

.user {
  font-weight: bold;
  color: #3b5998;
  cursor: pointer;
}

/* FOLLOW BUTTON */
.follow-btn {
  font-size: 11px;
  padding: 3px 6px;
  width: auto;
}

/* VERIFIED ICON */
.verified {
  width: 14px;
  vertical-align: middle;
}

/* UPVOTE */
.upvote {
  cursor: pointer;
  font-size: 12px;
}

/* DELETE */
.delete {
  font-size: 11px;
  color: red;
  cursor: pointer;
  float: right;
}

/* PROFILE PIC */
.profile-pic {
  width: 90px;
  height: 90px;
  border-radius: 6px;
  object-fit: cover;
  border: 2px solid #999;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar card">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('messages')">Messages</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- PROFILE (RIGHT SIDE) -->
  <div id="profile" class="card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" />

    <input type="file" id="profileUpload" />
    <button onclick="updateProfile()">Update</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;
let viewingUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGIN */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  loginError.innerText = "";

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      posts: [],
      followers: [],
      following: []
    };
  }

  if (users[u].password !== p) {
    loginError.innerText = "Password incorrect";
    return;
  }

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "flex";

  showTab("feed");
  loadFeed();
  loadProfile();
}

/* NAV */
function showTab(tab) {
  feed.style.display = tab === "feed" ? "block" : "none";
  messages.style.display = tab === "messages" ? "block" : "none";
  profile.style.display = "block";
}

function goHome() {
  viewingUser = null;
  loadProfile();
  showTab("feed");
}

function logout() {
  location.reload();
}

/* VERIFIED (100 FOLLOWERS) */
function isVerified(user) {
  let users = getUsers();
  return (users[user]?.followers?.length || 0) >= 100;
}

/* FOLLOW */
function toggleFollow(user) {
  let users = getUsers();

  users[currentUser].following ||= [];
  users[user].followers ||= [];

  if (!users[currentUser].following.includes(user)) {
    users[currentUser].following.push(user);
    users[user].followers.push(currentUser);
  } else {
    users[currentUser].following =
      users[currentUser].following.filter(x => x !== user);

    users[user].followers =
      users[user].followers.filter(x => x !== currentUser);
  }

  saveUsers(users);
  loadFeed();
}

/* OPEN PROFILE */
function openProfile(user) {
  viewingUser = user;
  loadProfile();
}

/* POSTS */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    time: new Date().toLocaleString(),
    likes: []
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* UPVOTE */
function upvote(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];
        if (!p.likes.includes(currentUser)) p.likes.push(currentUser);
        else p.likes = p.likes.filter(x => x !== currentUser);
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* FEED (FIXED LINKS + VERIFIED + FOLLOW BUTTON) */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a,b)=>b.id-a.id);

  posts.forEach(p => {
    let verified = isVerified(p.user);

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div>
        <span class="user" onclick="openProfile('${p.user}')">
          @${p.user}
          ${verified ? '<img class="verified" src="verified.png">' : ''}
        </span>

        <button class="follow-btn" onclick="toggleFollow('${p.user}')">
          Follow
        </button>
      </div>

      <div>${p.text}</div>

      <div class="upvote" onclick="upvote(${p.id})">
        ▲ ${p.likes?.length || 0}
      </div>

      <div style="font-size:11px;color:#777;">
        ${p.time}
      </div>
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[viewingUser || currentUser];

  profileName.innerHTML =
    "@" + (viewingUser || currentUser) +
    (isVerified(viewingUser || currentUser) ? ' <img class="verified" src="verified.png">' : '');

  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* PROFILE IMAGE */
function updateProfile() {
  let users = getUsers();

  let file = profileUpload.files[0];
  if (!file) return;

  let r = new FileReader();
  r.onload = e => {
    users[currentUser].pic = e.target.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}
</script>

</body>
</html>
