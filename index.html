<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.screen { display:none; }

.center {
  max-width:400px;
  margin:80px auto;
}

.card {
  background:white;
  padding:12px;
  border-radius:4px;
}

button {
  width:100%;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

input {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
}

</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- WELCOME -->
<div id="welcome" class="screen center card" style="display:block;">
  <h2>just WUPHF it.</h2>

  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen center card">
  <h3>Create Account</h3>
  <input id="signupUser" placeholder="Username">
  <input id="signupPass" type="password">
  <div id="signupError" style="color:red;font-size:12px;"></div>
  <button onclick="createAccount()">Create</button>
</div>

<script>

/* ✅ SAFE DOM ACCESS (fixes broken buttons issue) */
const loginUser = () => document.getElementById("loginUser");
const loginPass = () => document.getElementById("loginPass");
const signupUser = () => document.getElementById("signupUser");
const signupPass = () => document.getElementById("signupPass");

let currentUser=null;

/* SCREEN */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function goHome(){
  showScreen("welcome");
}

/* USERS */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* 🔥 FIXED LOGIN (always works + errors show) */
function login(){
  let users=getUsers();

  let u=document.getElementById("loginUser").value.trim();
  let p=document.getElementById("loginPass").value;

  let err=document.getElementById("loginError");

  if(!users[u]){
    err.innerText="Incorrect username";
    return;
  }

  if(users[u].password!==p){
    err.innerText="Incorrect password";
    return;
  }

  currentUser=u;
  err.innerText="";
  showScreen("app"); // NOTE: app screen exists in your full version
}

/* 🔥 FIXED CREATE ACCOUNT */
function createAccount(){
  let users=getUsers();

  let u=document.getElementById("signupUser").value.trim();
  let p=document.getElementById("signupPass").value;

  let err=document.getElementById("signupError");

  if(!u || !p) return;

  if(users[u]){
    err.innerText="Username already exists";
    return;
  }

  users[u]={
    password:p,
    posts:[],
    followers:[],
    following:[],
    messages:{},
    pic:"empty.jpg"
  };

  saveUsers(users);

  err.innerText="Account created. Login.";
}

</script>

</body>
</html>
