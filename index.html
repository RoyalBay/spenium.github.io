<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>

/* THEMES */
body.light {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

body.dark {
  margin:0;
  font-family:Tahoma;
  background:#1c1c1c;
  color:white;
}

body.dynamic {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.nav button {
  width:auto;
  margin-left:6px;
  padding:6px 10px;
  background:#3b5998;   /* FIXED BLUE BUTTONS */
  color:white;
  border:none;
  cursor:pointer;
}

/* LAYOUT */
.screen { display:none; }

.container {
  display:flex;
  gap:10px;
  max-width:1400px;
  margin:20px auto;
}

/* FEED WIDE */
.feed {
  flex:1;
}

/* PROFILE RIGHT */
.profile {
  width:260px;
}

/* CARD */
.card {
  background:white;
  padding:12px;
  border-radius:4px;
}

body.dark .card,
body.dynamic .card {
  background:#2a2a2a;
}

/* INPUT FIX */
input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border-radius:3px;
  border:1px solid #ccc;
  box-sizing:border-box;
  resize:none;
}

/* POSTS */
.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user {
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* BUTTONS */
button {
  width:auto;
  padding:6px 10px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

/* LIKE */
.like-btn {
  width:auto;
  font-size:12px;
  margin-top:6px;
}

/* DELETE FIXED */
.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

/* PROFILE */
.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.verified {
  font-weight:bold;
  color:#f5c542;
}

/* SETTINGS */
.settings-page {
  display:none;
  max-width:600px;
  margin:40px auto;
}

.settings-card {
  background:white;
  padding:15px;
  border-radius:6px;
}

body.dark .settings-card,
body.dynamic .settings-card {
  background:#2a2a2a;
}

</style>
</head>

<body class="light">

<!-- TOP BAR (NOW ALWAYS CLICKABLE) -->
<div class="topbar">
  <div onclick="goHome()" style="cursor:pointer;">WUPHF</div>

  <div class="nav">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('messages')">Messages</button>
    <button onclick="openSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN / SIGNUP -->
<div id="welcome" class="screen card" style="display:block; max-width:400px; margin:80px auto;">
  <h2>just WUPHF it.</h2>
  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create</button>
</div>

<div id="login" class="screen card" style="max-width:400px; margin:80px auto;">
  <input id="loginUser">
  <input id="loginPass" type="password">
  <div id="loginError" style="color:red;"></div>
  <button onclick="login()">Enter</button>
</div>

<div id="signup" class="screen card" style="max-width:400px; margin:80px auto;">
  <input id="signupUser">
  <input id="signupPass" type="password">
  <div id="signupError"></div>
  <button onclick="createAccount()">Create</button>
</div>

<!-- SETTINGS -->
<div id="settingsPage" class="settings-page">
  <div class="settings-card">
    <h2>Settings</h2>
    <h3>Themes</h3>
    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('dark')">Dark</button>
    <button onclick="setTheme('dynamic')">Dynamic</button>
    <p>More settings coming soon</p>
    <button onclick="exitSettings()">Back</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">
<div class="container">

  <!-- FEED -->
  <div id="feed" class="feed card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="profile card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" src="empty.jpg">
    <input type="file" onchange="updatePic(event)">

    <button onclick="refreshProfile()">Update Profile</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<!-- MESSAGES (FIXED NO PROFILE LEAK) -->
<div id="messages" class="card" style="display:none; max-width:900px; margin:20px auto;">
  <h3>Messages</h3>
  <input id="msgUser">
  <textarea id="msgText"></textarea>
  <button onclick="sendMessage()">Send</button>

  <div id="messageList"></div>
  <div id="chatBox"></div>
</div>

</div>

<script>

let currentUser=null;
let viewingUser=null;
let activeChat=null;

/* NAV SAFE */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* FIX SETTINGS LOCK ISSUE */
function showTab(tab){
  document.getElementById("feed").style.display="none";
  document.getElementById("messages").style.display="none";

  if(tab==="feed"){
    document.getElementById("feed").style.display="block";
    loadFeed();
  }

  if(tab==="messages"){
    document.getElementById("messages").style.display="block";
    loadInbox();
  }

  loadProfile();
}

/* SETTINGS SAFE */
function openSettings(){
  document.getElementById("app").style.display="none";
  document.getElementById("settingsPage").style.display="block";
}

function exitSettings(){
  document.getElementById("settingsPage").style.display="none";
  document.getElementById("app").style.display="block";
}

/* STORAGE */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");
  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
    u[k].verified ||= false;
  });
  return u;
}
function saveUsers(u){ localStorage.setItem("users",JSON.stringify(u)); }

/* LOGIN FIX */
function login(){
  let users=getUsers();
  let u=loginUser.value;
  let p=loginPass.value;

  loginError.innerText="";

  if(!users[u]) return loginError.innerText="Incorrect username";
  if(users[u].password!==p) return loginError.innerText="Incorrect password";

  currentUser=u;
  showScreen("app");
  showTab("feed");
}

/* POSTS */
function addPost(){
  let users=getUsers();
  let text=postText.value;
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    time:new Date().toLocaleString(),
    likes:0
  });

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{

    let verified = users[p.user].verified ? "◆" : "";

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user" onclick="openProfile('${p.user}')">
        ${p.user} ${verified}
      </div>

      <div>${p.text}</div>
      <div style="font-size:11px;color:gray;">${p.time}</div>

      <button onclick="likePost(${p.id})">▲ ${p.likes}</button>

      ${p.user===currentUser?`<div class="delete" onclick="deletePost(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* LIKE FIX */
function likePost(id){
  let users=getUsers();

  Object.values(users).forEach(u=>{
    u.posts.forEach(p=>{
      if(p.id===id) p.likes++;
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE FIX */
function deletePost(id){
  let users=getUsers();
  users[currentUser].posts=users[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(users);
  loadFeed();
}

/* PROFILE SAFE */
function loadProfile(){
  let users=getUsers();
  let u=users[viewingUser||currentUser];

  if(!u) return;

  profilePic.src=u.pic;
  profileName.innerHTML=`<b>@${viewingUser||currentUser}</b> ${u.verified?"◆":""}`;
  profileFollowers.innerText="Followers: "+u.followers.length;
}

/* MESSAGES FIXED */
function sendMessage(){
  let users=getUsers();
  let to=msgUser.value;
  let text=msgText.value;

  if(!users[to]||!text) return;

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  let msg={from:currentUser,text};

  users[currentUser].messages[to].push(msg);
  users[to].messages[currentUser].push(msg);

  saveUsers(users);
  loadInbox();
}

function loadInbox(){
  let users=getUsers();
  messageList.innerHTML="";

  Object.keys(users[currentUser].messages).forEach(u=>{
    let div=document.createElement("div");
    div.innerText="@"+u;
    div.onclick=()=>loadChat(u);
    messageList.appendChild(div);
  });
}

function loadChat(u){
  let users=getUsers();
  chatBox.innerHTML="";

  (users[currentUser].messages[u]||[]).forEach(m=>{
    let div=document.createElement("div");
    div.innerText=m.from+": "+m.text;
    chatBox.appendChild(div);
  });
}

/* PROFILE PIC */
function updatePic(e){
  let file=e.target.files[0];
  let r=new FileReader();

  r.onload=()=>{
    let users=getUsers();
    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };

  r.readAsDataURL(file);
}

/* OTHER */
function refreshProfile(){ loadProfile(); }
function openProfile(u){ viewingUser=u; loadProfile(); }
function logout(){ currentUser=null; showScreen("welcome"); }

</script>

</body>
</html>
