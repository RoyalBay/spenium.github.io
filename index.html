<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px;
  font-weight:bold;
}

.card {
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:15px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button {
  width:100%;
  padding:10px;
  background:#3b5998;
  color:white;
  border:none;
  margin-top:6px;
  cursor:pointer;
}

.hidden { display:none; }
.error { color:red; font-size:12px; }
</style>
</head>

<body>

<div class="topbar">WUPHF</div>

<div id="login" class="card">
  <h3>Login</h3>
  <input id="l_user" placeholder="Username">
  <input id="l_pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="showSignup()">Create Account</button>

  <div id="err" class="error"></div>
</div>

<div id="signup" class="card hidden">
  <h3>Create Account</h3>

  <input id="s_user" placeholder="Username">
  <input id="s_pass" type="password" placeholder="Password">

  <button onclick="signup()">Create</button>
  <button onclick="showLogin()">Back</button>

  <div id="err2" class="error"></div>
</div>

<script>

/* THEME */
function applyTheme(){
  let t = localStorage.getItem("theme") || "light";

  if(t==="dark") document.body.style.background="#1e1e1e";
  else if(t==="dynamic") document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
  else document.body.style.background="linear-gradient(#dfe7f3,#f5f6f7)";
}
applyTheme();

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* NAV */
function showSignup(){
  login.classList.add("hidden");
  signup.classList.remove("hidden");
}
function showLogin(){
  signup.classList.add("hidden");
  login.classList.remove("hidden");
}

/* LOGIN */
function login(){
  let u=getUsers();
  let name=l_user.value.trim();
  let pass=l_pass.value;

  if(!u[name]){
    err.innerText="User not found";
    return;
  }

  if(u[name].password!==pass){
    err.innerText="Incorrect password";
    return;
  }

  localStorage.setItem("currentUser",name);
  location="feed.html";
}

/* SIGNUP */
function signup(){
  let u=getUsers();

  let name=s_user.value.trim();
  let pass=s_pass.value;

  if(u[name]){
    err2.innerText="Username already in use";
    return;
  }

  u[name]={ password:pass, posts:[], followers:[], pic:"" };

  saveUsers(u);
  showLogin();
}

</script>

</body>
</html>
