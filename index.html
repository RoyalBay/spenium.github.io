<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>

/* THEMES */
body.light {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

body.dark {
  margin:0;
  font-family:Tahoma;
  background:#1c1c1c;
  color:white;
}

body.dynamic {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.nav button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  margin-left:6px;
  cursor:pointer;
}

/* LAYOUT */
.screen { display:none; }

.container {
  display:flex;
  max-width:1400px;
  margin:20px auto;
  gap:10px;
}

/* FEED */
.feed {
  flex:1;
}

/* PROFILE */
.profile {
  width:260px;
}

/* CARD */
.card {
  background:white;
  padding:12px;
  border-radius:4px;
}

body.dark .card,
body.dynamic .card {
  background:#2a2a2a;
}

/* INPUTS */
input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  box-sizing:border-box;
  resize:none;
}

/* POSTS */
.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user-row {
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:10px;
}

.user {
  font-weight:bold; /* FIXED AGAIN */
  color:#3b5998;
  cursor:pointer;
}

/* BLUE BUTTONS RESTORED */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
  width:auto;
}

/* LIKE */
.like-btn {
  margin-top:6px;
  width:auto;
}

/* DELETE */
.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  color:red;
  font-size:11px;
  cursor:pointer;
}

/* PROFILE */
.profile-pic {
  width:90px;
  height:90px;
  border-radius:6px;
  object-fit:cover;
}

.verified {
  color:#f5c542;
  font-weight:bold;
}

/* LOGIN SCREEN */
.login-box {
  max-width:400px;
  margin:80px auto;
  background:white;
  padding:15px;
  border-radius:4px;
}

</style>
</head>

<body class="light">

<!-- TOP BAR (FIXED NAV ALWAYS WORKS) -->
<div class="topbar">
  <div onclick="goHome()" style="cursor:pointer;">WUPHF</div>

  <div class="nav">
    <button onclick="showFeed()">Feed</button>
    <button onclick="showMessages()">Messages</button>
    <button onclick="openSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-box screen" style="display:block;">
  <h2>just WUPHF it.</h2>
  <p>whenever. wherever.</p>

  <h3>Create Account / Login</h3>

  <input id="user">
  <input id="pass" type="password">

  <button onclick="login()">Login</button>
  <button onclick="createAccount()">Create Account</button>

  <div id="loginError" style="color:red;"></div>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="screen card" style="max-width:500px; margin:40px auto;">
  <h2>Settings</h2>

  <h3>Themes</h3>
  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('dynamic')">Dynamic</button>
</div>

<!-- APP -->
<div id="app" class="screen">

<div class="container">

  <!-- FEED -->
  <div id="feed" class="feed card">
    <h3>Feed</h3>

    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>

    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div class="profile card">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic">
    <input type="file" onchange="updatePic(event)">
    <button onclick="refreshProfile()">Update Profile</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<!-- MESSAGES -->
<div id="messages" class="screen card" style="max-width:900px; margin:20px auto;">
  <h3>Messages</h3>

  <input id="msgTo" placeholder="user">
  <textarea id="msgText"></textarea>
  <button onclick="sendMessage()">Send</button>

  <div id="msgList"></div>
  <div id="chat"></div>
</div>

</div>

<script>

let currentUser=null;
let viewingUser=null;
let likedMap={};

/* NAV FIXED */
function showFeed(){
  if(!currentUser) return;
  document.getElementById("settingsScreen").style.display="none";
  document.getElementById("messages").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("feed").style.display="block";
  loadFeed();
}

function showMessages(){
  if(!currentUser) return;
  document.getElementById("app").style.display="none";
  document.getElementById("messages").style.display="block";
}

/* HOME ALWAYS WORKS */
function goHome(){
  showFeed();
}

/* SETTINGS */
function openSettings(){
  document.getElementById("app").style.display="none";
  document.getElementById("settingsScreen").style.display="block";
}

function setTheme(t){
  document.body.className=t;
}

/* LOGIN */
function login(){
  currentUser=user.value;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
  showFeed();
}

/* CREATE */
function createAccount(){
  currentUser=user.value;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
}

/* POSTS */
function addPost(){
  let users=getUsers();
  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:postText.value,
    likes:0,
    time:new Date().toLocaleString()
  });
  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <div class="user-row">
        <div class="user">@${p.user}</div>
        <button>Follow</button>
      </div>

      <div>${p.text}</div>
      <div style="font-size:11px">${p.time}</div>

      <button class="like-btn" onclick="like(${p.id})">▲ ${p.likes}</button>

      ${p.user===currentUser?`<div class="delete" onclick="del(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* LIKE FIX */
function like(id){
  if(!likedMap[currentUser]) likedMap[currentUser]={};
  if(likedMap[currentUser][id]) return;

  likedMap[currentUser][id]=true;

  let users=getUsers();
  Object.values(users).forEach(u=>{
    u.posts.forEach(p=>{
      if(p.id===id) p.likes++;
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE FIX */
function del(id){
  let users=getUsers();
  users[currentUser].posts=users[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(users);
  loadFeed();
}

/* PROFILE */
function loadProfile(){
  let users=getUsers();
  let u=users[currentUser];

  profileName.innerHTML=`<b>@${currentUser}</b>`;
  profileFollowers.innerText="Followers: "+u.followers.length;
}

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
