<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
}

.topbar {
  background: #3b5998;
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  display: none;
  gap: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 4px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.sidebar { width: 160px; float: left; }
#feed, #messages, #profile { margin-left: 180px; }

input, button, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ccd0d5;
  border-radius: 3px;
}

button {
  background: #3b5998;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

textarea { height: 80px; resize: none; }

.user {
  font-weight: bold;
  color: #3b5998;
  cursor: pointer;
}

.post {
  border-top: 1px solid #eee;
  padding: 10px 0;
  position: relative;
}

.actions {
  font-size: 12px;
}

.upvote {
  cursor: pointer;
}

.delete {
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: 11px;
  color: red;
  cursor: pointer;
}

.small {
  font-size: 11px;
  color: #777;
}

.error {
  color: red;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <div id="loginError" class="error"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="sidebar card">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('messages')">Inbox</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- MESSAGES -->
  <div id="messages" class="card" style="display:none;">
    <h3>Inbox</h3>

    <input id="msgUser" placeholder="Username" />
    <textarea id="msgText"></textarea>
    <button onclick="sendMessage()">Send</button>

    <div id="messageList"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card">
    <h3>Profile</h3>
    <img id="profilePic" width="90" height="90" style="border-radius:6px;object-fit:cover;" />
    <input type="file" id="profileUpload" />
    <button onclick="updateProfile()">Update Profile</button>

    <p id="profileName"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGIN (INLINE ERROR FIX) */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  loginError.innerText = "";

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      posts: [],
      followers: [],
      following: [],
      messages: {}
    };
  }

  if (users[u].password !== p) {
    loginError.innerText = "Password incorrect";
    return;
  }

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "block";

  showTab("feed");
  loadFeed();
  loadProfile();
}

/* NAV */
function showTab(tab) {
  feed.style.display = tab === "feed" ? "block" : "none";
  messages.style.display = tab === "messages" ? "block" : "none";
  profile.style.display = "block";

  if (tab === "messages") loadInbox();
}

function goHome() {
  showTab("feed");
}

function logout() {
  location.reload();
}

/* POSTS */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    time: new Date().toLocaleString(),
    likes: []
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* UPVOTE */
function upvote(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];
        if (!p.likes.includes(currentUser)) p.likes.push(currentUser);
        else p.likes = p.likes.filter(x => x !== currentUser);
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE (ONLY OWNER) */
function deletePost(id, owner) {
  if (owner !== currentUser) return;

  let users = getUsers();

  Object.values(users).forEach(u => {
    u.posts = (u.posts || []).filter(p => p.id !== id);
  });

  saveUsers(users);
  loadFeed();
}

/* FEED */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a,b)=>b.id-a.id);

  posts.forEach(p => {
    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="user">@${p.user}</div>
      <div>${p.text}</div>

      <div class="actions">
        <span class="upvote" onclick="upvote(${p.id})">▲ ${p.likes?.length||0}</span>
      </div>

      <div class="small">${p.time}</div>

      ${p.user === currentUser ? 
        `<div class="delete" onclick="deletePost(${p.id}, '${p.user}')">delete</div>` 
        : ""}
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[currentUser];

  profileName.innerText = "@" + currentUser;
  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* PROFILE IMAGE */
function updateProfile() {
  let users = getUsers();

  let file = profileUpload.files[0];
  if (!file) return;

  let r = new FileReader();
  r.onload = e => {
    users[currentUser].pic = e.target.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}

/* ================= MESSAGES (REAL INBOX + REPLY) ================= */

function sendMessage() {
  let users = getUsers();
  let to = msgUser.value;
  let text = msgText.value;

  if (!users[to]) return;

  users[currentUser].messages ||= {};
  users[to].messages ||= {};

  users[currentUser].messages[to] ||= [];
  users[to].messages[currentUser] ||= [];

  let msg = { from: currentUser, text };

  users[currentUser].messages[to].push(msg);
  users[to].messages[currentUser].push(msg);

  saveUsers(users);

  msgText.value = "";
  loadInbox();
}

function loadInbox() {
  let users = getUsers();
  let box = document.getElementById("messageList");
  box.innerHTML = "";

  let convos = users[currentUser].messages || {};

  Object.keys(convos).forEach(user => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerText = "@" + user;

    div.onclick = () => openChat(user);

    box.appendChild(div);
  });
}

function openChat(user) {
  let users = getUsers();
  let box = document.getElementById("messageList");

  box.innerHTML = "";

  let msgs = users[currentUser].messages?.[user] || [];

  msgs.forEach(m => {
    let div = document.createElement("div");
    div.innerText = m.from + ": " + m.text;
    box.appendChild(div);
  });
}
</script>

</body>
</html>
