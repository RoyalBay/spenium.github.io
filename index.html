<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar {
  background:#3b5998;
  color:white;
  padding:12px 18px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.screen { display:none; }

.center {
  max-width:400px;
  margin:80px auto;
}

.container {
  max-width:1050px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

.sidebar { width:150px; }
.feed { width:580px; }
.profile { width:250px; }

.card {
  background:white;
  padding:12px;
  border-radius:4px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:3px;
  box-sizing:border-box;
}

textarea { height:70px; resize:none; }

button {
  width:100%;
  padding:8px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:5px;
}

.user {
  color:#3b5998;
  font-weight:bold;
  cursor:pointer;
}

.post {
  border-top:1px solid #eee;
  padding:10px 0;
  position:relative;
}

.follow-btn {
  font-size:10px;
  padding:2px 5px;
  width:auto;
  margin-left:8px;
}

.upvote {
  cursor:pointer;
  font-size:12px;
}

/* ✅ RESTORED DELETE BUTTON */
.delete {
  position:absolute;
  bottom:5px;
  right:5px;
  font-size:11px;
  color:red;
  cursor:pointer;
}

.profile-pic {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.verified {
  width:14px;
  vertical-align:middle;
}

.profile-name {
  font-weight:bold;
}

#messageList div {
  padding:6px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

#chatBox div {
  padding:6px;
  margin:4px 0;
  background:#f1f1f1;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="topbar" onclick="goHome()">WUPHF</div>

<!-- WELCOME -->
<div id="welcome" class="screen center card" style="display:block;">
  <h2>just WUPHF it.</h2>
  <p style="font-size:12px;color:#555;">whenever. whenever.</p>

  <button onclick="showScreen('login')">Login</button>
  <button onclick="showScreen('signup')">Create Account</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen center card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <div id="loginError" style="color:red;font-size:12px;"></div>
  <button onclick="login()">Enter</button>
</div>

<!-- SIGNUP -->
<div id="signup" class="screen center card">
  <h3>Create Account</h3>
  <input id="signupUser" placeholder="Username">
  <input id="signupPass" type="password" placeholder="Password">
  <div id="signupError" style="color:red;font-size:12px;"></div>
  <button onclick="createAccount()">Create</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <div class="container">

    <div class="sidebar card">
      <button onclick="showTab('feed')">Feed</button>
      <button onclick="showTab('messages')">Messages</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- FEED -->
    <div id="feed" class="feed card">
      <h3>Feed</h3>
      <textarea id="postText"></textarea>
      <button onclick="addPost()">Post</button>
      <div id="posts"></div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="feed card" style="display:none;">
      <h3>Messages</h3>
      <input id="msgUser" placeholder="Username">
      <textarea id="msgText"></textarea>
      <button onclick="sendMessage()">Send</button>

      <div id="messageList"></div>
      <div id="chatBox"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="profile card">
      <h3>Profile</h3>

      <!-- ✅ RESTORED PROFILE UPLOAD -->
      <img id="profilePic" class="profile-pic" src="empty.jpg">
      <input type="file" accept="image/*" onchange="updatePic(event)">

      <p id="profileName"></p>
      <p id="profileFollowers"></p>
    </div>

  </div>
</div>

<script>
let currentUser=null;
let viewingUser=null;

/* USERS */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");

  Object.keys(u).forEach(k=>{
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].following ||= [];
    u[k].messages ||= {};
    u[k].pic ||= "empty.jpg";
  });

  return u;
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* POSTS (🕒 RESTORED DATE/TIME + 🗑 DELETE) */
function addPost(){
  let users=getUsers();
  let text=postText.value.trim();
  if(!text) return;

  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text,
    time:new Date().toLocaleString(),   // ✅ RESTORED TIME
    likes:[]
  });

  saveUsers(users);
  loadFeed();
}

/* FEED RENDER */
function loadFeed(){
  let users=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(users).forEach(u=>all.push(...u.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <span class="user" onclick="openProfile('${p.user}')">
        @${p.user}
        ${isVerified(p.user)?'<img class="verified" src="verified.png">':''}
      </span>

      <div>${p.text}</div>

      <!-- 🕒 RESTORED TIME DISPLAY -->
      <div style="font-size:11px;color:#777;margin-top:4px;">
        ${p.time || ""}
      </div>

      <!-- 🗑 RESTORED DELETE -->
      ${p.user===currentUser?
        `<div class="delete" onclick="deletePost(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });
}

/* DELETE RESTORED FUNCTION */
function deletePost(id){
  let users=getUsers();
  users[currentUser].posts =
    users[currentUser].posts.filter(p=>p.id!==id);

  saveUsers(users);
  loadFeed();
}

/* PROFILE PIC RESTORED */
function updatePic(e){
  let file=e.target.files[0];
  if(!file) return;

  let r=new FileReader();
  r.onload=()=>{
    let users=getUsers();
    users[currentUser].pic=r.result;
    saveUsers(users);
    loadProfile();
  };
  r.readAsDataURL(file);
}
</script>

</body>
</html>
