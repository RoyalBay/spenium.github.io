<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
  color: #1c1e21;
}

.topbar {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  display: none;
}

.card {
  background: white;
  border: 1px solid #cfd6e4;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 4px;
}

input, button, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border: 1px solid #ccd0d5;
  font-family: Tahoma;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  cursor: pointer;
  border: none;
  font-weight: bold;
}

textarea {
  resize: none;
  height: 80px;
}

.user {
  font-weight: bold;
  color: #3b5998;
}

.post-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.follow-btn {
  font-size: 10px;
  padding: 3px 6px;
  width: auto;
}

.like-btn {
  cursor: pointer;
  color: #3b5998;
  margin-right: 10px;
}

.delete-btn {
  cursor: pointer;
  color: red;
  font-size: 12px;
}

.small {
  font-size: 11px;
  color: #777;
}

.profile-pic {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  display: block;
}

/* DEV PANEL (hidden by default) */
#devPanel {
  display: none;
  position: fixed;
  right: 10px;
  bottom: 10px;
  background: black;
  color: white;
  padding: 10px;
  width: 220px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="topbar">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="card">
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('profile')">Profile</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card" style="display:none;">
    <h3>Profile</h3>

    <img id="profilePic" class="profile-pic" />

    <input type="file" id="profileUpload" />

    <select id="frameSelect">
      <option value="frame-none">None</option>
      <option value="frame-gold">Gold</option>
      <option value="frame-silver">Silver</option>
      <option value="frame-pink">Pink</option>
    </select>

    <button onclick="updateProfile()">Update</button>

    <p id="profileName" style="font-weight:bold;"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<!-- DEV TOOLS -->
<div id="devPanel">
  <b>DEV TOOLS</b><br><br>
  <input id="devUser" placeholder="User" />
  <button onclick="addFollowerDev()">+ Followers</button>
</div>

<script>
let currentUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGIN */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      frame: "frame-none",
      posts: [],
      followers: [],
      following: []
    };
  } else if (users[u].password !== p) {
    alert("Wrong password");
    return;
  }

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "block";

  if (currentUser === "wuphf") {
    devPanel.style.display = "block";
  }

  loadProfile();
  loadFeed();
}

function logout() {
  location.reload();
}

function showTab(tab) {
  feed.style.display = tab === "feed" ? "block" : "none";
  profile.style.display = tab === "profile" ? "block" : "none";
}

/* POST */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    likes: [],
    time: new Date().toLocaleString()
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* LIKE */
function likePost(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];

        if (!p.likes.includes(currentUser)) {
          p.likes.push(currentUser);
        } else {
          p.likes = p.likes.filter(x => x !== currentUser);
        }
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE */
function deletePost(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    if (u.posts) {
      u.posts = u.posts.filter(p =>
        !(p.id === id && (p.user === currentUser || currentUser === "wuphf"))
      );
    }
  });

  saveUsers(users);
  loadFeed();
}

/* FOLLOW */
function toggleFollow(user) {
  let users = getUsers();
  if (!users[user] || user === currentUser) return;

  let me = users[currentUser];
  let them = users[user];

  me.following ||= [];
  them.followers ||= [];

  if (!me.following.includes(user)) {
    me.following.push(user);
    them.followers.push(currentUser);
  } else {
    me.following = me.following.filter(f => f !== user);
    them.followers = them.followers.filter(f => f !== currentUser);
  }

  saveUsers(users);
  loadProfile();
  loadFeed();
}

/* VERIFIED */
function isVerified(user) {
  let users = getUsers();
  return (users[user]?.followers?.length || 0) >= 5;
}

/* FEED */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a, b) => b.id - a.id);

  posts.forEach(p => {
    let verified = isVerified(p.user);
    let isFollowing = users[currentUser]?.following?.includes(p.user);
    let liked = p.likes?.includes(currentUser);

    let div = document.createElement("div");

    div.innerHTML = `
      <div class="post-header">
        <div>
          <span class="user">@${p.user}</span>
          ${verified ? '<img src="verified.png" width="14">' : ''}
        </div>

        <button class="follow-btn" onclick="toggleFollow('${p.user}')">
          ${isFollowing ? "Unfollow" : "Follow"}
        </button>
      </div>

      <div>${p.text}</div>

      <div>
        <span class="like-btn" onclick="likePost(${p.id})">
          👍 ${p.likes?.length || 0} ${liked ? "(you)" : ""}
        </span>

        <span class="delete-btn" onclick="deletePost(${p.id})">
          🗑 Delete
        </span>
      </div>

      <div class="small">${p.time}</div>
      <hr>
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[currentUser];

  profileName.innerText = "@" + currentUser;
  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* UPDATE PROFILE */
function updateProfile() {
  let users = getUsers();

  let file = profileUpload.files[0];
  if (file) {
    let r = new FileReader();
    r.onload = e => {
      users[currentUser].pic = e.target.result;
      saveUsers(users);
      loadProfile();
    };
    r.readAsDataURL(file);
  }

  users[currentUser].frame = frameSelect.value;
  saveUsers(users);
  loadProfile();
}

/* DEV TOOL */
function addFollowerDev() {
  let users = getUsers();
  let u = devUser.value;

  if (!users[u]) return;

  users[u].followers.push("dev");
  saveUsers(users);

  loadProfile();
  loadFeed();
}

/* KEYBIND */
document.addEventListener("keydown", e => {
  if (currentUser === "wuphf" && e.ctrlKey && e.shiftKey && e.key === "D") {
    devPanel.style.display =
      devPanel.style.display === "block" ? "none" : "block";
  }
});
</script>

</body>
</html>
