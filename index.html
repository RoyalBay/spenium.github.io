<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF Login</title>

<style>
body {
  margin:0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
}

/* CENTER CARD */
.card {
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:16px;
  border-radius:5px;
}

/* INPUTS */
input {
  width:100%;
  padding:10px;
  margin:6px 0;
  box-sizing:border-box;
}

/* BUTTONS (KEEP OLD STYLE) */
button {
  width:100%;
  padding:10px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:6px;
}

/* HEADER TEXT */
h2 {
  margin:0 0 5px 0;
}

.sub {
  margin:0 0 15px 0;
  color:#666;
  font-size:13px;
}

/* ERROR */
#error {
  color:red;
  font-size:12px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="card">
  <h2>just WUPHF it.</h2>
  <p class="sub">whenever. wherever.</p>

  <!-- LOGIN -->
  <h3>Login</h3>
  <input id="loginUser" placeholder="username">
  <input id="loginPass" type="password" placeholder="password">
  <button onclick="login()">Login</button>

  <hr>

  <!-- SIGNUP -->
  <h3>Create Account</h3>
  <input id="newUser" placeholder="choose username">
  <input id="newPass" type="password" placeholder="choose password">
  <button onclick="signup()">Sign Up</button>

  <div id="error"></div>
</div>

<script>

/* SAFE USER STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

/* LOGIN (FIXED PROPERLY) */
function login(){
  let users = getUsers();

  let u = loginUser.value.trim();
  let p = loginPass.value;

  if(!users[u]){
    error.innerText = "User not found";
    return;
  }

  if(users[u].password !== p){
    error.innerText = "Wrong password";
    return;
  }

  // STORE SESSION
  localStorage.setItem("currentUser", u);

  // GO TO FEED
  window.location.href = "feed.html";
}

/* SIGNUP */
function signup(){
  let users = getUsers();

  let u = newUser.value.trim();
  let p = newPass.value;

  if(!u || !p){
    error.innerText = "Fill in all fields";
    return;
  }

  if(users[u]){
    error.innerText = "Username already exists";
    return;
  }

  users[u] = {
    password: p,
    posts: [],
    followers: [],
    pic: ""
  };

  saveUsers(users);

  error.innerText = "Account created. Now log in.";
}

</script>

</body>
</html>
