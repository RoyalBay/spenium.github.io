<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF</title>
<link rel="icon" href="wicon.png">

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:linear-gradient(#dfe7f3,#f5f6f7);
}

.topbar{
  height:44px;
  background:#3b5998;
  color:white;
  display:flex;
  align-items:center;
  padding:0 10px;
}

.loginBox{
  width:300px;
  margin:80px auto;
  background:white;
  border:1px solid #ccc;
  padding:20px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:8px;
  margin-top:5px;
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

.title{
  text-align:center;
  margin-top:40px;
}

.title h1{ font-weight:bold; margin:0; }
.title p{ margin:0; color:#555; }
</style>
</head>

<body>

<div class="topbar"><b>WUPHF</b></div>

<div class="title">
  <h1>just WUPHF it.</h1>
  <p>whenever. wherever.</p>
</div>

<div class="loginBox">

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>
<button onclick="create()">Create Account</button>

<div id="error"></div>

</div>

<script>
let users = JSON.parse(localStorage.getItem("users")||"{}");

function login(){
  let u=username.value;
  let p=password.value;

  if(!users[u]) return error.innerText="User not found";
  if(users[u].password!==p) return error.innerText="Wrong password";

  localStorage.setItem("currentUser",u);
  location.href="feed.html";
}

function create(){
  let u=username.value;
  let p=password.value;

  if(users[u]) return error.innerText="Username exists";

  users[u]={password:p,followers:[],posts:[],pic:""};
  localStorage.setItem("users",JSON.stringify(users));
  error.innerText="Account created";
}
</script>

</body>
</html>
