<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WUPHF</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
  color: #1c1e21;
}

.topbar {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  padding: 12px 18px;
  font-weight: bold;
  font-size: 22px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  display: none;
  flex-direction: row;
  gap: 10px;
  align-items: flex-start;
}

/* ❌ BORDERS REMOVED */
.card {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 4px;
  box-sizing: border-box;
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  border: none;
}

/* ❌ BORDERS REMOVED */
#profile {
  width: 260px;
  border: none;
}

.sidebar {
  width: 160px;
}

#feed {
  flex: 1;
  min-width: 0;
}

input, button, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border: 1px solid #ccd0d5;
  font-family: Tahoma;
  border-radius: 3px;
  box-sizing: border-box;
}

button {
  background: linear-gradient(#4c66a4, #3b5998);
  color: white;
  cursor: pointer;
  border: none;
  font-weight: bold;
}

textarea {
  resize: none;
  height: 80px;
}

.user {
  font-weight: bold;
  color: #3b5998;
}

.post-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.like-btn {
  cursor: pointer;
  color: #3b5998;
  margin-right: 10px;
}

.delete-btn {
  cursor: pointer;
  color: red;
  font-size: 12px;
}

.small {
  font-size: 11px;
  color: #777;
}

.profile-pic {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  display: block;
  border: 2px solid #999;
}
</style>
</head>

<body>

<div class="topbar">WUPHF</div>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:80px auto;">
  <h3>Login</h3>
  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Enter</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="sidebar">
    <div class="card">
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- FEED -->
  <div id="feed" class="card">
    <h3>Feed</h3>
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <button onclick="addPost()">Post</button>
    <div id="posts"></div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="card">
    <h3>Profile</h3>

    <div style="position:relative; width:90px; height:90px;">
      <img id="profilePic" class="profile-pic" />
      <img id="profileFrame"
           style="position:absolute; top:0; left:0; width:90px; height:90px; pointer-events:none;">
    </div>

    <input type="file" id="profileUpload" />

    <select id="frameSelect">
      <option value="frame-none">None</option>
      <option value="frame-gold">Gold</option>
      <option value="frame-silver">Silver</option>
      <option value="frame-pink">Pink</option>
    </select>

    <button onclick="updateProfile()">Update</button>

    <p id="profileName" style="font-weight:bold;"></p>
    <p id="profileFollowers"></p>
  </div>

</div>

<script>
let currentUser = null;

function getUsers() {
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u) {
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGIN */
function login() {
  let users = getUsers();
  let u = username.value;
  let p = password.value;

  if (!users[u]) {
    users[u] = {
      password: p,
      pic: "",
      frame: "frame-none",
      posts: [],
      followers: [],
      following: []
    };
  } else if (users[u].password !== p) {
    alert("Wrong password");
    return;
  }

  currentUser = u;
  saveUsers(users);

  loginBox.style.display = "none";
  app.style.display = "flex";

  loadProfile();
  loadFeed();
}

function logout() {
  location.reload();
}

/* PROFILE VIEW */
function openProfile(user) {
  let users = getUsers();
  let u = users[user];
  if (!u) return;

  feed.style.display = "none";
  profile.style.display = "block";

  let verified = (u.followers?.length || 0) >= 5;

  profileName.innerHTML =
    "@" + user +
    (verified ? ' <img src="verified.png" width="14">' : '');

  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* FEED */
function loadFeed() {
  let users = getUsers();
  let box = document.getElementById("posts");
  box.innerHTML = "";

  let posts = [];
  Object.values(users).forEach(u => {
    if (u.posts) posts.push(...u.posts);
  });

  posts.sort((a, b) => b.id - a.id);

  posts.forEach(p => {
    let verified = (users[p.user]?.followers?.length || 0) >= 5;

    let div = document.createElement("div");

    div.innerHTML = `
      <div class="post-header">
        <div>
          <span class="user" onclick="openProfile('${p.user}')" style="cursor:pointer;">
            @${p.user}
            ${verified ? '<img src="verified.png" width="14">' : ''}
          </span>
        </div>
      </div>

      <div>${p.text}</div>

      <div>
        <span class="like-btn" onclick="likePost(${p.id})">
          👍 ${p.likes?.length || 0}
        </span>

        <span class="delete-btn" onclick="deletePost(${p.id})">
          🗑 Delete
        </span>
      </div>

      <div class="small">${p.time}</div>
      <hr>
    `;

    box.appendChild(div);
  });
}

/* PROFILE */
function loadProfile() {
  let users = getUsers();
  let u = users[currentUser];

  let verified = (u.followers?.length || 0) >= 5;

  profileName.innerHTML =
    "@" + currentUser +
    (verified ? ' <img src="verified.png" width="14">' : '');

  profilePic.src = u.pic || "";
  profileFollowers.innerText = "Followers: " + (u.followers?.length || 0);
}

/* POST */
function addPost() {
  let users = getUsers();
  let text = postText.value.trim();
  if (!text) return;

  users[currentUser].posts.unshift({
    id: Date.now(),
    user: currentUser,
    text,
    likes: [],
    time: new Date().toLocaleString()
  });

  saveUsers(users);
  postText.value = "";
  loadFeed();
}

/* LIKE */
function likePost(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    (u.posts || []).forEach(p => {
      if (p.id === id) {
        p.likes ||= [];
        if (!p.likes.includes(currentUser)) {
          p.likes.push(currentUser);
        } else {
          p.likes = p.likes.filter(x => x !== currentUser);
        }
      }
    });
  });

  saveUsers(users);
  loadFeed();
}

/* DELETE */
function deletePost(id) {
  let users = getUsers();

  Object.values(users).forEach(u => {
    if (u.posts) {
      u.posts = u.posts.filter(p =>
        !(p.id === id && (p.user === currentUser || currentUser === "wuphf"))
      );
    }
  });

  saveUsers(users);
  loadFeed();
}

/* UPDATE PROFILE */
function updateProfile() {
  let users = getUsers();

  let file = profileUpload.files[0];
  if (file) {
    let r = new FileReader();
    r.onload = e => {
      users[currentUser].pic = e.target.result;
      saveUsers(users);
      loadProfile();
    };
    r.readAsDataURL(file);
  }

  users[currentUser].frame = frameSelect.value;
  saveUsers(users);
  loadProfile();
}
</script>

</body>
</html>
