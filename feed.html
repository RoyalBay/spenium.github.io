<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF</title>

<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  transition:0.3s;
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
}

.logo img{
  height:32px;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

/* LEFT PROFILE POPUP */
.profile{
  width:220px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* FEED */
.feed{
  flex:1;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* POST */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USERNAME LINK */
.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* VERIFIED */
.verified{
  color:#3b5998;
}

/* FILE INPUT FIX (SPACING ISSUE FIXED) */
input[type="file"]{
  display:block;
  margin-top:12px;
  margin-bottom:8px;
}

/* BUTTON STYLE */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<!-- LEFT PROFILE (OPENS ON CLICK) -->
<div id="leftProfile" class="profile" style="display:none;">
  <img id="leftPic" width="80">
  <div id="leftName"></div>
  <div id="leftFollowers"></div>
</div>

<!-- FEED -->
<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<!-- RIGHT PROFILE -->
<div class="profile">
  <img id="rightPic" width="80">
  <div id="rightName"></div>
  <div id="rightFollowers"></div>

  <!-- FIXED SPACING -->
  <input type="file" id="fileInput">
  <button onclick="uploadPic(fileInput.files[0])">
    Update Profile Picture
  </button>
</div>

</div>

<script src="app.js"></script>

<script>

/* THEME FIX (dynamic now consistent) */
function applyTheme(){
  let t = localStorage.getItem("theme") || "light";

  if(t==="light") document.body.style.background="#f5f6f7";
  if(t==="dark") document.body.style.background="#2b2b2b";
  if(t==="dynamic")
    document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
}
applyTheme();

/* LOAD */
function load(){
  posts.innerHTML="";

  let all=[];
  for(let u in users){
    all.push(...users[u].posts);
  }

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <span class="user" onclick="openProfile('${p.user}')">
        @${p.user}${verified(p.user)}
      </span>

      <div>${p.text}</div>

      <div style="font-size:11px;color:gray;">
        ${p.time || ""}
      </div>

      <div onclick="like(${p.id})">▲ ${p.likes||0}</div>

      ${p.user===currentUser ?
        `<div style="position:absolute;right:6px;bottom:6px;color:red;cursor:pointer;" onclick="del(${p.id})">delete</div>` : ""}
    `;

    posts.appendChild(div);
  });

  let me = users[currentUser];

  rightPic.src = me.pic || "";
  rightName.innerHTML = "<b>@"+currentUser+"</b>" + verified(currentUser);
  rightFollowers.innerText = "Followers: " + me.followers.length;
}

load();

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

function goSettings(){
  location.href="settings.html";
}

</script>

</body>
</html>
