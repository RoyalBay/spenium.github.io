<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
  transition:0.3s;
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:8px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO (BIGGER FIX) */
.logo {
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:22px;
}

.logo img {
  height:46px;
  width:auto;
  object-fit:contain;
}

/* BUTTON */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
}

/* LAYOUT */
.container {
  max-width:1100px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

/* PROFILE */
.profileCard {
  width:220px;
  background:white;
  padding:10px;
  border-radius:4px;
}

.profileHeader {
  display:flex;
  gap:10px;
}

.profileHeader img {
  width:70px;
  height:70px;
  border-radius:6px;
  object-fit:cover;
}

/* FEED */
.feed {
  flex:1;
  background:white;
  padding:10px;
}

/* TEXTAREA FIX */
textarea {
  width:100%;
  height:70px;
  resize:none;
  padding:8px;
  box-sizing:border-box;
}

/* POSTS */
.post {
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

.user {
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

.delete {
  position:absolute;
  right:5px;
  bottom:5px;
  color:red;
  cursor:pointer;
}

/* POST IMAGE */
.post img {
  width:30px;
  height:30px;
  border-radius:4px;
  margin-right:6px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="Facebook.jpg">
    <span>WUPHF</span>
  </div>

  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div id="leftProfile" class="profileCard" style="display:none;">
  <div class="profileHeader">
    <img id="leftPic">
    <div>
      <b id="leftName"></b><br>
      <span id="leftFollowers"></span>
    </div>
  </div>
</div>

<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<div class="profileCard">
  <div class="profileHeader">
    <img id="rightPic">
    <div>
      <b id="rightName"></b><br>
      <span id="rightFollowers"></span>
    </div>
  </div>
</div>

</div>

<script>

/* THEME FIX (GLOBAL SAFE) */
function applyTheme(){
  let t = localStorage.getItem("theme") || "light";

  document.body.style.background = "#f5f6f7";

  if(t==="dark"){
    document.body.style.background="#1e1e1e";
    document.body.style.color="white";
  }

  if(t==="dynamic"){
    document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
  }
}
applyTheme();

let currentUser = localStorage.getItem("currentUser");
if(!currentUser) location="index.html";

/* USERS */
function getUsers(){
  let u = JSON.parse(localStorage.getItem("users")||"{}");
  for(let k in u){
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].pic ||= "";
  }
  return u;
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* NAV */
function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

function goSettings(){
  location.href="settings.html";
}

/* VERIFIED */
function verified(u){
  return u.followers.length>=100 ? " ◆" : "";
}

/* SHOW USER */
function showUser(user){
  let u=getUsers();
  leftProfile.style.display="block";
  leftPic.src=u[user].pic||"";
  leftName.innerText="@"+user+verified(u[user]);
  leftFollowers.innerText="Followers: "+u[user].followers.length;
}

/* POST */
function post(){
  let u=getUsers();
  if(!text.value.trim()) return;

  u[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:text.value,
    time:new Date().toLocaleString(),
    likes:0,
    likedBy:[]
  });

  saveUsers(u);
  text.value="";
  load();
}

/* LIKE + UNLIKE FIX */
function like(id){
  let u=getUsers();

  for(let user in u){
    for(let p of u[user].posts){
      if(p.id === id){
        p.likedBy ||= [];

        if(p.likedBy.includes(currentUser)){
          // UNLIKE
          p.likedBy = p.likedBy.filter(x=>x!==currentUser);
        } else {
          // LIKE
          p.likedBy.push(currentUser);
        }

        p.likes = p.likedBy.length;
      }
    }
  }

  saveUsers(u);
  load();
}

/* FOLLOW */
function follow(target){
  let u=getUsers();
  let f=u[target].followers;

  if(f.includes(currentUser)){
    u[target].followers=f.filter(x=>x!==currentUser);
  } else {
    f.push(currentUser);
  }

  saveUsers(u);
  load();
}

/* DELETE */
function del(id){
  let u=getUsers();
  u[currentUser].posts = u[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(u);
  load();
}

/* LOAD */
function load(){
  let u=getUsers();
  posts.innerHTML="";

  let all=[];
  for(let x in u) all.push(...u[x].posts);
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let owner=u[p.user];

    let div=document.createElement("div");
    div.className="post";

    let liked = (p.likedBy||[]).includes(currentUser);

    div.innerHTML=`
      <div>
        <img src="${owner.pic||""}">
        <span class="user" onclick="showUser('${p.user}')">
          @${p.user}${verified(owner)}
        </span>
      </div>

      <div>${p.text}</div>
      <div style="font-size:11px;color:gray;">${p.time}</div>

      <div onclick="like(${p.id})">
        ▲ ${p.likes} ${liked ? "(liked)" : ""}
      </div>

      ${p.user===currentUser ? `<div class="delete" onclick="del(${p.id})">delete</div>` : ""}
    `;

    posts.appendChild(div);
  });

  let me=getUsers()[currentUser];
  rightPic.src=me.pic||"";
  rightName.innerText="@"+currentUser;
  rightFollowers.innerText="Followers: "+me.followers.length;
}

load();

</script>

</body>
</html>
