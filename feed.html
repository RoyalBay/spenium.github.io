<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Feed</title>
<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

/* TOP BAR */
.topbar{
  height:44px;
  background:#3b5998;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
}

.topbar .left{
  display:flex;
  align-items:center;
  gap:8px;
}

.topbar img{
  height:32px;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

/* FEED */
.feed{
  flex:1;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* PROFILE */
.profile{
  width:220px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* POSTS */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USERNAME */
.user{
  font-weight:bold;
  cursor:pointer;
  color:#3b5998;
}

/* DELETE BUTTON */
.delete{
  position:absolute;
  bottom:5px;
  right:5px;
  color:red;
  cursor:pointer;
  font-size:12px;
}

/* TEXTAREA FIX */
textarea{
  width:100%;
  height:60px;
  resize:none;
  box-sizing:border-box;
}

/* BUTTONS */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  margin-top:5px;
  cursor:pointer;
}

/* LEFT POPUP PROFILE (UPDATED SIZE ONLY) */
#popup{
  display:none;
  position:fixed;
  left:10px;
  top:80px;
  width:220px;   /* MATCH RIGHT PROFILE */
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="left">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="location.href='settings.html'">Settings</button>
    <button onclick="location.href='index.html'">Logout</button>
  </div>
</div>

<!-- POPUP PROFILE -->
<div id="popup">
  <img id="ppic" width="60">
  <div id="pname"></div>
  <div id="pfollow"></div>
</div>

<div class="container">

  <div class="feed">
    <textarea id="text"></textarea>
    <button onclick="post()">Post</button>
    <div id="posts"></div>
  </div>

  <div class="profile">

    <img id="rightPic" width="70" height="70" style="object-fit:cover;">
    
    <!-- BOLD USERNAME FIX -->
    <div id="rightName" style="font-weight:bold;"></div>

    <div id="rightFollowers"></div>

    <input type="file" id="file">
    <button onclick="upload(file.files[0])">Update Profile Picture</button>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
