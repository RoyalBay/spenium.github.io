<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Feed</title>

<link rel="icon" type="image/png" href="wicon.png">

<style>
body{
  margin:0;
  font-family:Tahoma;
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  padding:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

/* BUTTONS */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

.feed{
  flex:1;
  background:white;
  padding:10px;
  border:1px solid #000;
}

.profile{
  width:220px;
  background:white;
  padding:10px;
  border:1px solid #000;
  text-align:center;
}

/* POST */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USER */
.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* DELETE */
.delete{
  position:absolute;
  right:5px;
  bottom:5px;
  color:red;
  cursor:pointer;
}

/* FILE FIX */
input[type="file"]{
  width:100%;
  border:1px solid #000;
  padding:4px;
}

.profileBtn{
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="topbar">
  <div style="font-weight:bold;">WUPHF</div>
  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div class="profile">
  <img id="pic" width="80">
  <div id="name"></div>
  <div id="followers"></div>

  <input type="file" onchange="upload(event)">
  <button class="profileBtn" onclick="upload()">Update Profile Picture</button>
</div>

<div class="feed">
  <textarea id="text" style="width:100%;height:60px;"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

</div>

<script>

let currentUser=localStorage.getItem("currentUser");
let users=JSON.parse(localStorage.getItem("users")||"{}");

function save(){
  localStorage.setItem("users",JSON.stringify(users));
}

/* FOLLOW FIX */
function follow(u){
  if(!users[u]) return;

  let f=users[u].followers;

  if(f.includes(currentUser)){
    users[u].followers=f.filter(x=>x!==currentUser);
  } else {
    f.push(currentUser);
  }

  save();
  load();
}

/* POST */
function post(){
  users[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:text.value,
    likes:0,
    likedBy:[]
  });

  save();
  text.value="";
  load();
}

/* LIKE */
function like(id){
  for(let u in users){
    for(let p of users[u].posts){
      if(p.id===id){
        p.likedBy ||= [];
        if(p.likedBy.includes(currentUser)){
          p.likedBy=p.likedBy.filter(x=>x!==currentUser);
        } else {
          p.likedBy.push(currentUser);
        }
        p.likes=p.likedBy.length;
      }
    }
  }
  save();
  load();
}

/* LOAD */
function load(){
  posts.innerHTML="";

  let all=[];
  for(let u in users){
    all.push(...users[u].posts);
  }

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <span class="user" onclick="follow('${p.user}')">
        @${p.user}
      </span>

      <div>${p.text}</div>

      <div onclick="like(${p.id})">▲ ${p.likes||0}</div>
    `;

    posts.appendChild(div);
  });

  name.innerText=currentUser;
  followers.innerText="Followers: "+(users[currentUser].followers.length||0);
}

load();

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

function goSettings(){
  location.href="settings.html";
}

function upload(e){
  let file=e?.target?.files?.[0];
  if(!file) return;

  let r=new FileReader();
  r.onload=()=>{
    users[currentUser].pic=r.result;
    save();
    load();
  };
  r.readAsDataURL(file);
}

</script>

</body>
</html>
