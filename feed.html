<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Feed</title>

<link rel="icon" type="image/png" href="wicon.png">

<style>
body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  height:30px;
}

.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

.feed{
  flex:1;
  background:white;
  padding:10px;
  border:1px solid #ccc;
}

.profile{
  width:220px;
  background:white;
  padding:10px;
  border:1px solid #ccc;
}

/* POST */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USER */
.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* DELETE FIX POSITION */
.delete{
  position:absolute;
  right:6px;
  bottom:6px;
  color:red;
  cursor:pointer;
}

/* TEXTAREA FIX */
textarea{
  width:100%;
  height:60px;
  resize:none;
  box-sizing:border-box;
}

/* FILE BUTTON FIX */
input[type="file"]{
  width:100%;
  padding:4px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<div class="container">

<div class="profile">
  <img id="pic" width="70">
  <div id="name"></div>
  <div id="followers"></div>

  <input type="file" id="fileInput">
  <button onclick="upload()">Update Profile Picture</button>
</div>

<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

</div>

<script src="app.js"></script>

<script>

/* LOAD (kept here for UI only) */
function load(){
  posts.innerHTML = "";

  let all = [];
  for(let u in users){
    all.push(...users[u].posts);
  }

  all.sort((a,b)=>b.id - a.id);

  all.forEach(p=>{
    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <span class="user" onclick="follow('${p.user}')">
        @${p.user}
      </span>

      <div>${p.text}</div>

      <div style="font-size:11px;color:gray;">
        ${p.time || ""}
      </div>

      <div onclick="like(${p.id})">▲ ${p.likes || 0}</div>

      ${p.user===currentUser ?
        `<div class="delete" onclick="del(${p.id})">delete</div>` : ""}
    `;

    posts.appendChild(div);
  });

  let me = users[currentUser];

  name.innerText = "@" + currentUser;
  followers.innerText = "Followers: " + me.followers.length;
}

load();

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

function goSettings(){
  location.href="settings.html";
}

/* PROFILE PIC */
function upload(){
  let file = fileInput.files[0];
  if(!file) return;

  let r = new FileReader();
  r.onload = () => {
    users[currentUser].pic = r.result;
    save();
    load();
  };
  r.readAsDataURL(file);
}

</script>

</body>
</html>
