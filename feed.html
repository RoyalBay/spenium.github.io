<!DOCTYPE html>
<html>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<head>
<meta charset="UTF-8">
<title>WUPHF Feed</title>
<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

/* TOP BAR */
.topbar{
  height:44px;
  background:#3b5998;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
}

.topbar .left{
  display:flex;
  align-items:center;
  gap:8px;
}

.topbar img{
  height:32px;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

/* FEED */
.feed{
  flex:1;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* RIGHT PROFILE (REFERENCE SIZE) */
.profile{
  width:220px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* POSTS */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USERNAME */
.user{
  font-weight:bold;
  cursor:pointer;
  color:#3b5998;
}

/* DELETE */
.delete{
  position:absolute;
  bottom:5px;
  right:5px;
  color:red;
  cursor:pointer;
  font-size:12px;
}

/* TEXTAREA FIX */
textarea{
  width:100%;
  height:60px;
  resize:none;
  box-sizing:border-box;
}

/* BUTTONS */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  margin-top:5px;
  cursor:pointer;
}

/* LEFT POPUP PROFILE (NOW MATCHES RIGHT PROFILE SIZE) */
#popup{
  display:none;
  position:fixed;
  left:10px;
  top:80px;
  width:220px;     /* MATCH RIGHT PROFILE */
  background:white;
  border:1px solid #ccc;
  padding:10px;
  box-sizing:border-box;
}

/* POPUP USERNAME BOLD FIX */
#pname{
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">

  <div class="left">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="location.href='settings.html'">Settings</button>
    <button onclick="location.href='index.html'">Logout</button>
  </div>

</div>

<!-- LEFT POPUP PROFILE -->
<div id="popup">

  <img id="ppic" width="60">
  
  <div id="pname"></div>   <!-- NOW BOLD VIA CSS -->
  
  <div id="pfollow"></div>

</div>

<div class="container">

  <div class="feed">
    <textarea id="text"></textarea>
    <button onclick="post()">Post</button>
    <div id="posts"></div>
  </div>

  <div class="profile">

    <img id="rightPic" width="70" height="70" style="object-fit:cover;">

    <div id="rightName" style="font-weight:bold;"></div>

    <div id="rightFollowers"></div>

    <input type="file" id="file">
    <button onclick="upload(file.files[0])">Update Profile Picture</button>

  </div>

</div>

<script src="app.js">
 function applyTheme(){

  let t = localStorage.getItem("theme") || "light";

  document.body.style.transition="background 0.3s ease";

  if(t==="dark"){
    document.body.style.background="#1e1e1e";

    document.querySelector(".feed").style.background="#2b2b2b";
    document.querySelector(".profile").style.background="#2b2b2b";

    document.body.style.color="white";
  }

  else if(t==="light"){
    document.body.style.background="#f5f6f7";

    document.querySelector(".feed").style.background="white";
    document.querySelector(".profile").style.background="white";

    document.body.style.color="black";
  }

  else if(t==="dynamic"){
    let t0 = Date.now()/800;
    let r = Math.floor(128 + 127*Math.sin(t0));
    let g = Math.floor(128 + 127*Math.sin(t0+2));
    let b = Math.floor(128 + 127*Math.sin(t0+4));

    document.body.style.background=`rgb(${r},${g},${b})`;
  }
}
  
applyTheme();
setInterval(applyTheme, 2000);
  
</script>

</body>
</html>
