<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  padding:8px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  font-size:22px;
}

.logo img{
  height:54px;
}

/* LAYOUT */
.container{
  max-width:1100px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

/* PROFILE CARD (FIXED VISTA STYLE) */
.profileCard{
  width:220px;
  background:white;
  padding:10px;
  border-radius:4px;
  text-align:center;   /* FIX IMPORTANT */
}

.profileCard img{
  width:80px;
  height:80px;
  border-radius:6px;
  object-fit:cover;
  display:block;
  margin:0 auto 8px auto;
}

/* FEED */
.feed{
  flex:1;
  background:white;
  padding:10px;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:70px;
  resize:none;
  padding:8px;
  box-sizing:border-box;
}

/* POSTS */
.post{
  border-top:1px solid #eee;
  padding:10px;
}

.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <span>WUPHF</span>
  </div>

</div>

<div class="container">

<!-- LEFT PROFILE -->
<div id="leftProfile" class="profileCard" style="display:none;">
  <img id="leftPic">
  <b id="leftName"></b><br>
  <span id="leftFollowers"></span>
</div>

<!-- FEED -->
<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<!-- RIGHT PROFILE -->
<div class="profileCard">
  <img id="rightPic">
  <b id="rightName"></b><br>
  <span id="rightFollowers"></span>
</div>

</div>

<script>

function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");
  for(let k in u){
    u[k].posts ||= [];
    u[k].followers ||= [];
    u[k].pic ||= "";
  }
  return u;
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* PROFILE VIEW FIX */
function showUser(user){
  let u=getUsers();
  if(!u[user]) return;

  leftProfile.style.display="block";
  leftPic.src=u[user].pic||"";
  leftName.innerText="@"+user;
  leftFollowers.innerText="Followers: "+u[user].followers.length;
}

/* POST */
function post(){
  let u=getUsers();
  if(!text.value.trim()) return;

  u[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:text.value,
    time:new Date().toLocaleString(),
    likes:0,
    likedBy:[]
  });

  saveUsers(u);
  text.value="";
  load();
}

/* LOAD (unchanged logic assumed from previous working version) */
function load(){
  let u=getUsers();
  posts.innerHTML="";

  let all=[];
  for(let x in u) all.push(...u[x].posts);
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let owner=u[p.user];

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <span class="user" onclick="showUser('${p.user}')">
        @${p.user}
      </span>
      <div>${p.text}</div>
      <div style="font-size:11px;color:#777;">${p.time}</div>
      <div>▲ ${p.likes}</div>
    `;

    posts.appendChild(div);
  });

  let me=u[currentUser];
  rightPic.src=me.pic||"";
  rightName.innerText="@"+currentUser;
  rightFollowers.innerText="Followers: "+me.followers.length;
}

let currentUser=localStorage.getItem("currentUser");
if(!currentUser) location="index.html";

load();

</script>

</body>
</html>
