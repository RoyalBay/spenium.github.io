<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF</title>

<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

/* TOP BAR FIX (LOGO CENTER ISSUE FIXED) */
.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  height:34px;
  object-fit:contain;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

/* RIGHT PROFILE */
.profile{
  width:220px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* FEED */
.feed{
  flex:1;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* POSTS */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USERNAME */
.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* DELETE FIX */
.delete{
  position:absolute;
  right:6px;
  bottom:6px;
  color:red;
  cursor:pointer;
}

/* TEXTAREA FIX */
textarea{
  width:100%;
  height:60px;
  resize:none;
  border:1px solid #ccc;
}

/* BUTTON STYLE RESTORED */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
}

.profilePic{
  width:70px;
  height:70px;
  object-fit:cover;
}

</style>
</head>

<body>

<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<div class="container">

<!-- LEFT PROFILE POPUP -->
<div id="leftProfile" class="profile" style="display:none;">
  <img id="leftPic" class="profilePic">
  <div id="leftName"></div>
  <div id="leftFollowers"></div>
</div>

<!-- FEED -->
<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<!-- RIGHT PROFILE -->
<div class="profile">
  <img id="rightPic" class="profilePic">
  <div id="rightName"></div>
  <div id="rightFollowers"></div>

  <!-- FIXED SPACING (VISIBLE + NOT CRAMMED) -->
  <div style="margin-top:12px;"></div>

  <input type="file" id="fileInput">
  <button onclick="uploadPic(fileInput.files[0])">
    Update Profile Picture
  </button>
</div>

</div>

<script src="app.js"></script>

<script>

/* RENDER FUNCTION (RESTORES EVERYTHING LOST) */
function render(){
  posts.innerHTML = "";

  let all = [];
  for(let u in users){
    all.push(...users[u].posts);
  }

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let owner = users[p.user];
    if(!owner) return;

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <span class="user" onclick="openProfile('${p.user}')">
        @${p.user}${verified(p.user)}
      </span>

      <button onclick="follow('${p.user}')">
        ${owner.followers.includes(currentUser) ? "Unfollow" : "Follow"}
      </button>

      <div>${p.text}</div>

      <div style="font-size:11px;color:gray;">
        ${p.time || ""}
      </div>

      <div onclick="like(${p.id})">▲ ${p.likes || 0}</div>

      ${p.user===currentUser ?
        `<div class="delete" onclick="del(${p.id})">delete</div>` : ""}
    `;

    posts.appendChild(div);
  });

  let me = users[currentUser];

  rightPic.src = me.pic || "";
  rightName.innerHTML = "<b>@"+currentUser+"</b>" + verified(currentUser);
  rightFollowers.innerText = "Followers: " + me.followers.length;
}

render();

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

function goSettings(){
  location.href="settings.html";
}

</script>

</body>
</html>
