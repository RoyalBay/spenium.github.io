<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed</title>
<link rel="icon" href="wicon.png">

<style>
body{
  margin:0;
  font-family:Tahoma;
}

.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
}

.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

.feed{
  flex:1;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

.profile{
  width:220px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

.post{
  border-top:1px solid #eee;
  padding:10px;
}

textarea{
  width:100%;
  height:60px;
  resize:none;
}

button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="topbar">
  <b>WUPHF</b>
  <div>
    <button onclick="location.href='settings.html'">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<div class="profile">
  <img id="rightPic" width="80">
  <div id="rightName"></div>
  <div id="rightFollowers"></div>

  <input type="file" id="fileInput">
  <button onclick="uploadPic(fileInput.files[0])">Update Picture</button>
</div>

</div>

<script src="app.js"></script>

<script>
function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}
</script>

</body>
</html>
