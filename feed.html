<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF Feed</title>

<style>
body {
  margin:0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.topbar button {
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
  margin-left:8px;
}

/* LAYOUT */
.container {
  max-width:1000px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

/* FEED */
.feed {
  flex:1;
  background:white;
  padding:12px;
  border-radius:5px;
}

/* POST BOX */
textarea {
  width:100%;
  height:80px;
  resize:none;
  padding:10px;
  box-sizing:border-box;
}

/* POST */
.post {
  border-top:1px solid #ddd;
  padding:10px 0;
  position:relative;
}

.user {
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* BUTTONS */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
  margin-top:6px;
}

/* DELETE */
.delete {
  position:absolute;
  right:5px;
  bottom:5px;
  color:red;
  font-size:11px;
  cursor:pointer;
}

/* PROFILE SIDE */
.side {
  width:220px;
  background:white;
  padding:12px;
  border-radius:5px;
}

.small {
  font-size:12px;
  color:#555;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div onclick="goProfile()" style="cursor:pointer;">WUPHF</div>

  <div>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- FEED -->
  <div class="feed">

    <h3>Create Post</h3>
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Post</button>

    <div id="feed"></div>

  </div>

  <!-- SIDE PROFILE -->
  <div class="side">
    <h3 id="name"></h3>
    <p id="followers"></p>
  </div>

</div>

<script>

let user = localStorage.getItem("currentUser");

if(!user){
  window.location.href = "index.html";
}

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

/* NAV */
function goProfile(){
  alert("Profile page will connect next file (profile.html)");
}

/* ADD POST */
function addPost(){
  let users = getUsers();

  users[user].posts.unshift({
    id: Date.now(),
    user,
    text: postText.value,
    likes: 0,
    likedBy: {},
    time: new Date().toLocaleString()
  });

  saveUsers(users);
  load();
}

/* LIKE (FIXED: ONE PER USER ONLY) */
function like(id){
  let users = getUsers();

  Object.values(users).forEach(u=>{
    (u.posts || []).forEach(p=>{
      if(p.id === id){
        if(p.likedBy[user]) return;

        p.likes++;
        p.likedBy[user] = true;
      }
    });
  });

  saveUsers(users);
  load();
}

/* DELETE */
function del(id){
  let users = getUsers();
  users[user].posts = users[user].posts.filter(p => p.id !== id);
  saveUsers(users);
  load();
}

/* FOLLOW / UNFOLLOW */
function toggleFollow(target){
  let users = getUsers();

  if(!users[target]) return;

  let followers = users[target].followers || [];

  if(followers.includes(user)){
    users[target].followers = followers.filter(f => f !== user);
  } else {
    followers.push(user);
    users[target].followers = followers;
  }

  saveUsers(users);
  load();
}

/* LOAD FEED */
function load(){
  let users = getUsers();
  feed.innerHTML = "";

  let all = [];
  Object.values(users).forEach(u=>{
    if(u.posts) all.push(...u.posts);
  });

  all.sort((a,b)=>b.id - a.id);

  all.forEach(p=>{
    let div = document.createElement("div");
    div.className = "post";

    let isFollowing = users[p.user].followers?.includes(user);

    div.innerHTML = `
      <div class="user" onclick="alert('Profile: ${p.user}')">
        @${p.user}
      </div>

      <button onclick="toggleFollow('${p.user}')">
        ${isFollowing ? "Unfollow" : "Follow"}
      </button>

      <div>${p.text}</div>
      <div class="small">${p.time}</div>

      <button onclick="like(${p.id})">▲ ${p.likes}</button>

      ${p.user === user ? `<div class="delete" onclick="del(${p.id})">delete</div>` : ""}
    `;

    feed.appendChild(div);
  });
}

/* PROFILE SIDEBAR */
function loadProfile(){
  let users = getUsers();
  let u = users[user];

  name.innerHTML = "<b>@"+user+"</b>";
  followers.innerText = "Followers: " + (u.followers?.length || 0);
}

load();
loadProfile();

</script>

</body>
</html>
