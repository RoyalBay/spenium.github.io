<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Feed</title>

<link rel="icon" type="image/png" href="wicon.png">

<style>

/* BODY */
body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

/* TOP BAR (RESTORED BLUE + BUTTON FIX) */
.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  height:30px;
}

/* BUTTON FIX (THIS WAS CAUSING GREY ISSUE) */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
  font-weight:normal;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

/* PROFILE BOX */
.profile{
  width:220px;
  background:white;
  padding:10px;
  border:1px solid #ccc;
}

/* FEED */
.feed{
  flex:1;
  background:white;
  padding:10px;
  border:1px solid #ccc;
}

/* POST */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USERNAME (FIXED BOLD + CLICKABLE) */
.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* DELETE POSITION FIX */
.delete{
  position:absolute;
  right:6px;
  bottom:6px;
  color:red;
  cursor:pointer;
}

/* PROFILE PIC */
.profilePic{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:5px;
}

/* TEXTAREA FIX */
textarea{
  width:100%;
  height:60px;
  resize:none;
  box-sizing:border-box;
  border:1px solid #ccc;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<div class="container">

<!-- LEFT PROFILE (CLICKED USER) -->
<div id="leftProfile" class="profile" style="display:none;">
  <img id="leftPic" class="profilePic">
  <div id="leftName"></div>
  <div id="leftFollowers"></div>
</div>

<!-- FEED -->
<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<!-- RIGHT PROFILE -->
<div class="profile">
  <img id="rightPic" class="profilePic">
  <div id="rightName"></div>
  <div id="rightFollowers"></div>

  <!-- FIXED PROFILE UPLOAD -->
  <input type="file" onchange="uploadPic(this.files[0])">
  <button onclick="uploadPic()">Update Profile Picture</button>
</div>

</div>

<script src="app.js"></script>

<script>

/* LOAD FUNCTION (RESTORES EVERYTHING YOU LOST) */
function load(){
  posts.innerHTML="";

  let all=[];

  for(let u in users){
    all.push(...users[u].posts);
  }

  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let owner = users[p.user];
    if(!owner) return;

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML=`
      <span class="user" onclick="follow('${p.user}')">
        @${p.user}
      </span>

      <button onclick="follow('${p.user}')">
        ${owner.followers.includes(currentUser) ? "Unfollow" : "Follow"}
      </button>

      <div>${p.text}</div>

      <div style="font-size:11px;color:gray;">
        ${p.time || ""}
      </div>

      <div onclick="like(${p.id})">▲ ${p.likes||0}</div>

      ${p.user===currentUser ? `<div class="delete" onclick="del(${p.id})">delete</div>` : ""}
    `;

    posts.appendChild(div);
  });

  let me = users[currentUser];

  rightPic.src = me.pic || "";
  rightName.innerHTML = "<b>@"+currentUser+"</b>";
  rightFollowers.innerText = "Followers: " + me.followers.length;
}

load();

function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}

function goSettings(){
  location.href="settings.html";
}

</script>

</body>
</html>
