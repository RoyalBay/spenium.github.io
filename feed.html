<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed</title>

<style>
body {
  margin:0;
  font-family:Tahoma;
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  font-size:20px;
}

/* BUTTON */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
}

/* LAYOUT */
.container {
  max-width:1100px;
  margin:20px auto;
  display:flex;
  gap:10px;
}

/* LEFT PROFILE (CLICKED USER) */
.leftProfile {
  width:220px;
  background:white;
  padding:10px;
  text-align:center;
  display:none;
}

.leftProfile img {
  width:80px;
  height:80px;
  border-radius:6px;
  object-fit:cover;
}

/* FEED */
.feed {
  flex:1;
  background:white;
  padding:10px;
}

/* RIGHT PROFILE (YOU) */
.rightProfile {
  width:220px;
  background:white;
  padding:10px;
  text-align:center;
}

.rightProfile img {
  width:80px;
  height:80px;
  border-radius:6px;
  object-fit:cover;
}

/* TEXTAREA FIX */
textarea {
  width:100%;
  height:70px;
  resize:none;
  padding:8px;
  box-sizing:border-box;
}

/* POSTS */
.post {
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

.user {
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

.delete {
  position:absolute;
  right:5px;
  bottom:5px;
  color:red;
  cursor:pointer;
}

.follow-btn {
  margin-left:6px;
  font-size:11px;
}

/* POST PIC */
.post img {
  width:30px;
  height:30px;
  border-radius:4px;
  vertical-align:middle;
  margin-right:6px;
}
</style>
</head>

<body>

<div class="topbar">
  <div><b>WUPHF</b></div>
  <div>
    <button onclick="goSettings()">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<!-- LEFT PROFILE (CLICKED USER) -->
<div id="leftProfile" class="leftProfile">
  <img id="leftPic">
  <h3 id="leftName"></h3>
  <p id="leftFollowers"></p>
</div>

<!-- FEED -->
<div class="feed">
  <textarea id="text"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</div>

<!-- RIGHT PROFILE (YOU) -->
<div class="rightProfile">
  <img id="rightPic">
  <h3 id="rightName"></h3>
  <p id="rightFollowers"></p>
</div>

</div>

<script>

/* THEME */
function applyTheme(){
  let t=localStorage.getItem("theme")||"light";
  if(t==="dark") document.body.style.background="#1e1e1e";
  else if(t==="dynamic") document.body.style.background="linear-gradient(#3b5998,#8b9dc3)";
}
applyTheme();

let currentUser=localStorage.getItem("currentUser");
if(!currentUser) location="index.html";

/* STORAGE */
function getUsers(){
  let u=JSON.parse(localStorage.getItem("users")||"{}");
  Object.keys(u).forEach(k=>{
    u[k].posts||=[];
    u[k].followers||=[];
    u[k].pic||="";
  });
  return u;
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

/* NAV */
function logout(){
  localStorage.removeItem("currentUser");
  location="index.html";
}
function goSettings(){
  location="settings.html";
}

/* VERIFIED ◆ */
function verified(u){
  return u.followers.length>=100 ? " ◆" : "";
}

/* SHOW LEFT PROFILE */
function showUser(user){
  let u=getUsers();

  leftProfile.style.display="block";
  leftPic.src=u[user].pic||"";
  leftName.innerHTML="<b>@"+user+verified(u[user])+"</b>";
  leftFollowers.innerText="Followers: "+u[user].followers.length;
}

/* POST */
function post(){
  let u=getUsers();
  if(!text.value.trim()) return;

  u[currentUser].posts.unshift({
    id:Date.now(),
    user:currentUser,
    text:text.value,
    time:new Date().toLocaleString(),
    likes:0,
    likedBy:{}
  });

  saveUsers(u);
  text.value="";
  load();
}

/* LIKE */
function like(id){
  let u=getUsers();

  Object.values(u).forEach(x=>{
    x.posts.forEach(p=>{
      if(p.id===id && !p.likedBy[currentUser]){
        p.likes++;
        p.likedBy[currentUser]=true;
      }
    });
  });

  saveUsers(u);
  load();
}

/* FOLLOW */
function follow(target){
  let u=getUsers();
  let f=u[target].followers;

  if(f.includes(currentUser))
    u[target].followers=f.filter(x=>x!==currentUser);
  else f.push(currentUser);

  saveUsers(u);
  load();
}

/* DELETE */
function del(id){
  let u=getUsers();
  u[currentUser].posts=u[currentUser].posts.filter(p=>p.id!==id);
  saveUsers(u);
  load();
}

/* LOAD */
function load(){
  let u=getUsers();
  posts.innerHTML="";

  let all=[];
  Object.values(u).forEach(x=>all.push(...x.posts));
  all.sort((a,b)=>b.id-a.id);

  all.forEach(p=>{
    let div=document.createElement("div");
    div.className="post";

    let isFollow=u[p.user].followers.includes(currentUser);

    div.innerHTML=`
      <div>
        <img src="${u[p.user].pic || ""}">
        <span class="user" onclick="showUser('${p.user}')">
          @${p.user}${verified(u[p.user])}
        </span>
        <button class="follow-btn" onclick="follow('${p.user}')">
          ${isFollow?"Unfollow":"Follow"}
        </button>
      </div>

      <div>${p.text}</div>
      <div style="font-size:11px;color:#777;">${p.time}</div>

      <div onclick="like(${p.id})">▲ ${p.likes}</div>

      ${p.user===currentUser?`<div class="delete" onclick="del(${p.id})">delete</div>`:""}
    `;

    posts.appendChild(div);
  });

  /* RIGHT PROFILE (YOU) */
  rightPic.src=u[currentUser].pic||"";
  rightName.innerHTML="<b>@"+currentUser+"</b>";
  rightFollowers.innerText="Followers: "+u[currentUser].followers.length;
}

load();

</script>

</body>
</html>
