<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WUPHF Feed</title>

<link rel="icon" href="wicon.png">

<style>

body{
  margin:0;
  font-family:Tahoma;
  background:#f5f6f7;
}

/* TOP BAR */
.topbar{
  background:#3b5998;
  color:white;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  height:34px;
}

/* LAYOUT */
.container{
  display:flex;
  max-width:1100px;
  margin:20px auto;
  gap:10px;
}

/* FEED CENTER */
.feed{
  flex:1;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* RIGHT PROFILE */
.profile{
  width:220px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* LEFT POPUP PROFILE */
#leftProfile{
  display:none;
  position:fixed;
  left:10px;
  top:80px;
  width:180px;
  background:white;
  border:1px solid #ccc;
  padding:10px;
}

/* POSTS */
.post{
  border-top:1px solid #eee;
  padding:10px;
  position:relative;
}

/* USERNAME */
.user{
  font-weight:bold;
  color:#3b5998;
  cursor:pointer;
}

/* DELETE */
.delete{
  position:absolute;
  right:6px;
  bottom:6px;
  color:red;
  cursor:pointer;
}

/* TEXTAREA FIX */
textarea{
  width:100%;
  height:60px;
  resize:none;
  border:1px solid #ccc;
  box-sizing:border-box;
}

/* BUTTONS */
button{
  background:#3b5998;
  color:white;
  border:none;
  padding:6px;
  cursor:pointer;
  margin-top:5px;
}

/* PROFILE IMAGE */
.profilePic{
  width:70px;
  height:70px;
  object-fit:cover;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div class="logo">
    <img src="Facebook.jpg">
    <b>WUPHF</b>
  </div>

  <div>
    <button onclick="location.href='settings.html'">Settings</button>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- LEFT PROFILE POPUP -->
<div id="leftProfile">
  <img id="leftPic" class="profilePic">
  <div id="leftName"></div>
  <div id="leftFollowers"></div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- FEED -->
  <div class="feed">

    <textarea id="text"></textarea>
    <button onclick="post()">Post</button>

    <div id="posts"></div>

  </div>

  <!-- RIGHT PROFILE -->
  <div class="profile">

    <img id="rightPic" class="profilePic">
    <div id="rightName"></div>
    <div id="rightFollowers"></div>

    <input type="file" id="fileInput">
    <button onclick="uploadPic(fileInput.files[0])">
      Update Profile Picture
    </button>

  </div>

</div>

<!-- IMPORTANT: MUST LOAD LAST -->
<script src="app.js"></script>

<script>
function logout(){
  localStorage.removeItem("currentUser");
  location.href="index.html";
}
</script>

</body>
</html>
