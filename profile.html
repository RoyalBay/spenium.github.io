<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WUPHF Profile</title>

<style>
body {
  margin:0;
  font-family: Tahoma, Arial, sans-serif;
  background: linear-gradient(#dfe7f3, #f5f6f7);
}

/* TOP BAR */
.topbar {
  background:#3b5998;
  color:white;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.topbar button {
  background:#3b5998;
  color:white;
  border:none;
  cursor:pointer;
}

/* CARD */
.card {
  max-width:500px;
  margin:40px auto;
  background:white;
  padding:15px;
  border-radius:5px;
}

/* PROFILE PIC */
img {
  width:90px;
  height:90px;
  border-radius:6px;
  object-fit:cover;
  display:block;
  margin-bottom:10px;
}

/* INPUT FIX */
input {
  width:100%;
  padding:8px;
  margin:6px 0;
  box-sizing:border-box;
}

/* BUTTON */
button {
  background:#3b5998;
  color:white;
  border:none;
  padding:8px;
  cursor:pointer;
  width:auto;
  margin-top:6px;
}

/* NAME */
.name {
  font-weight:bold;
  font-size:18px;
}

/* FOLLOW */
.followers {
  margin-top:5px;
  color:#555;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div onclick="go('feed.html')" style="cursor:pointer;">WUPHF</div>
  <div>
    <button onclick="go('feed.html')">Feed</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- PROFILE -->
<div class="card">

  <h3>Profile</h3>

  <img id="pic" src="">

  <!-- UPLOAD -->
  <input type="file" onchange="upload(event)">
  <button onclick="updateProfile()">Update Profile Picture</button>

  <div class="name" id="name"></div>
  <div class="followers" id="followers"></div>

  <button onclick="refresh()">Refresh</button>

</div>

<script>

let user = localStorage.getItem("currentUser");

if(!user){
  window.location.href = "index.html";
}

/* STORAGE */
function getUsers(){
  return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

/* NAV */
function go(page){
  window.location.href = page;
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

/* LOAD PROFILE */
function load(){
  let users = getUsers();
  let u = users[user];

  name.innerHTML = "<b>@"+user+"</b>";
  followers.innerText = "Followers: " + (u.followers?.length || 0);
  pic.src = u.pic || "";
}

/* IMAGE UPLOAD */
let tempImage = null;

function upload(e){
  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = () => {
    tempImage = reader.result;
  };

  reader.readAsDataURL(file);
}

/* UPDATE PROFILE */
function updateProfile(){
  if(!tempImage) return;

  let users = getUsers();
  users[user].pic = tempImage;
  saveUsers(users);

  load();
}

/* REFRESH */
function refresh(){
  load();
}

load();

</script>

</body>
</html>
